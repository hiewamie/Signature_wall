function enqueue(glowCanvas, name) {

/* ── Sphere helpers ── */
const SIG_ASPECT = 120 / 320;
const sigBaseW   = () => R * 0.58;

function project(fx, fy, fz) {
  let x = fx * R, y = fy * R, z = fz * R;
  const cY = Math.cos(rotY), sY = Math.sin(rotY);
  let rx = x*cY - z*sY, rz = x*sY + z*cY, ry = y;
  const cX = Math.cos(rotX), sX = Math.sin(rotX);
  let ry2 = ry*cX - rz*sX, rz2 = ry*sX + rz*cX;
  const fov = 900, sc = fov / (fov + rz2);
  return { sx: cx + rx*sc, sy: cy + ry2*sc, scale: sc, depth: rz2 };
}

function fibonacciPos(index, total) {
  const golden = Math.PI * (3 - Math.sqrt(5));
  const yRaw   = 1 - ((index + 0.5) / (Math.max(total, 1))) * 2;
  const y      = yRaw * 0.85;
  const r      = Math.sqrt(Math.max(0, 1 - y*y));
  const theta  = golden * index;
  return { x: r*Math.cos(theta), y, z: r*Math.sin(theta) };
}

function drawFlame(now) {
  fctx.clearRect(0, 0, W, H);

  const t = now * 0.001;

  /* ── 1. Outermost soft blue halo ── */

    const outer = inner + len;
    const wid   = 0.09 + 0.05 * Math.abs(Math.sin(t + i));

    const x1 = cx + Math.cos(angle - wid) * inner;
    const y1 = cy + Math.sin(angle - wid) * inner;
    const x2 = cx + Math.cos(angle + wid) * inner;
    const y2 = cy + Math.sin(angle + wid) * inner;
    const tx  = cx + Math.cos(angle) * outer;
    const ty  = cy + Math.sin(angle) * outer;

    const fl = fctx.createLinearGradient(
      cx + Math.cos(angle) * inner, cy + Math.sin(angle) * inner,
      tx, ty
    );
    const brightness = 0.5 + 0.5 * Math.abs(Math.sin(t * 1.7 + i));

    fl.addColorStop(0.5, rgba(0,160,255,${0.30 * brightness}));

    fctx.closePath();
    fctx.fillStyle = fl;
    fctx.fill();
  }

  /* ── 4. Second pass – slow large flame lobes ── */
  const LOBES = 7;
  for (let i = 0; i < LOBES; i++) {
    const base  = (i / LOBES) * Math.PI * 2 + t * 0.18;
    const drift = Math.sin(t * 0.8 + i * 1.1) * 0.2;
    const angle = base + drift;
    const len   = R * (0.22 + 0.14 * Math.abs(Math.sin(t * 0.6 + i * 2.3)));

    const outer = inner + len;

    const lobe = fctx.createRadialGradient(
      cx + Math.cos(angle) * (inner + len * 0.4),
      cy + Math.sin(angle) * (inner + len * 0.4),
      0,
      cx, cy, outer

    lobe.addColorStop(0.5, rgba(0,120,255,${a * 0.5}));

    fctx.beginPath();
    fctx.arc(
      cx + Math.cos(angle) * (inner + len * 0.5),
      cy + Math.sin(angle) * (inner + len * 0.5),
      len * 0.55, 0, Math.PI * 2
    );
    fctx.fillStyle = lobe;
    fctx.fill();

  /* ── 5. Concentric pulsing rings (like reference image) ── */

  for (let i = 0; i < RINGS; i++) {
    const rr    = R * (1.0 + i * 0.18);

    fctx.beginPath();
    fctx.arc(cx, cy, rr, 0, Math.PI * 2);
    fctx.strokeStyle = rgba(0,200,255,${alpha});
    fctx.lineWidth   = 2.5 - i * 0.4;
    fctx.stroke();

  inner.addColorStop(0.6, 'rgba(0,60,160,0.08)');
  inner.addColorStop(0.85,'rgba(0,140,255,0.15)');
  inner.addColorStop(1,   'rgba(0,200,255,0.0)');
  fctx.fillStyle = inner;
  fctx.beginPath();
  fctx.arc(cx, cy, R * 0.98, 0, Math.PI * 2);
  fctx.fill();

  }
  for (let i = 0; i < 12; i++) {
    const theta = (i / 12) * Math.PI * 2;
    ctx.beginPath(); let first = true;
    for (let j = 0; j <= 40; j++) {
      const phi = (j / 40) * Math.PI;
      const p = project(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
      if (p.depth > 0) { if (first) { ctx.moveTo(p.sx, p.sy); first = false; } else ctx.lineTo(p.sx, p.sy); } else first = true;
    }
    ctx.stroke();
  }
  ctx.restore();
}

/* ── Main render loop ── */
function animate(now) {
  ctx.clearRect(0, 0, W, H);
  if (!isDragging) rotY += 0.003;

  /* Draw flame effect on its own canvas */
  drawFlame(now);

  /* Faint ambient fill */
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 1.2);
  g.addColorStop(0, 'rgba(10,40,120,0.04)');
  g.addColorStop(0.6, 'rgba(0,100,200,0.02)');
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  drawWireframe();
  tickFlyIn(now);

  /* Draw sphere signatures */
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R * 1.08, 0, Math.PI * 2);
  ctx.clip();

  const projected = signatures.map(s => {
    const p = project(s.fx, s.fy, s.fz);
    return { s, ...p };
  }).sort((a, b) => a.depth - b.depth);

  for (const item of projected) {
    const { s, sx, sy, scale, depth } = item;
    if (!s.glowCanvas) continue;
    if (flyIn && flyIn.phase === 'shrink' && s === signatures[signatures.length - 1]) continue;
    if (s.opacity < 1) s.opacity = Math.min(1, s.opacity + 0.025);
    const depthNorm = (depth + R) / (2 * R);
    const depthFade = 0.08 + 0.92 * Math.pow(depthNorm, 1.3);
    const capSc = Math.min(scale, 1.15);
    const sw = sigBaseW() * capSc, sh = sw * SIG_ASPECT;
    ctx.save();
    ctx.globalAlpha = depthFade * s.opacity;
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(s.glowCanvas, sx - sw/2, sy - sh/2, sw, sh);
    ctx.restore();
  }
  ctx.restore();

  drawFlyIn(now);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

/* ── Ripple ── */
function spawnRipple() {
  const el = document.createElement('div'); el.className = 'ripple';
  el.style.left = cx + 'px'; el.style.top = cy + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

/* ── Data layer ── */
function addSilently(row) {
  seenIds.add(row.id);
  const img = new Image();
  img.onload = () => {
    const key = row.id;
    if (!glowCache.has(key)) glowCache.set(key, buildGlowCanvas(img));
    signatures.push({ glowCanvas: glowCache.get(key), name: row.name, fx: 0, fy: 0, fz: 1, opacity: 0 });
    repositionAll();
    document.getElementById('sig-count').textContent = signatures.length;
  };
  img.src = row.image_data;
}

function handleNewRow(row) {
  if (!row || seenIds.has(row.id)) return;
  seenIds.add(row.id);
  spawnRipple();
  const img = new Image();
  img.onload = () => {
    const key = row.id;
    if (!glowCache.has(key)) glowCache.set(key, buildGlowCanvas(img));
    enqueue(glowCache.get(key), row.name);
  };
  img.src = row.image_data;
}

async function loadExisting() {
  try {
    const res = await fetch(${SUPABASE_URL}/rest/v1/signatures?select=*&order=created_at.asc, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': Bearer ${SUPABASE_ANON} }
    });
    const data = await res.json();
    if (Array.isArray(data)) data.forEach(row => addSilently(row));
  } catch(e) { console.error('loadExisting', e); }
}

let heartbeatInterval = null, realtimeRef = 1;
function subscribeRealtime() {
  const ws = new WebSocket(wss://gpdkcalhqbvztctoofwh.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_ANON}&vsn=1.0.0);
  ws.onopen = () => {
    ws.send(JSON.stringify({ topic: 'realtime:public:signatures', event: 'phx_join', payload: { config: { broadcast: { self: false }, presence: { key: '' }, postgres_changes: [{ event: 'INSERT', schema: 'public', table: 'signatures' }] } }, ref: String(realtimeRef++) }));
    heartbeatInterval = setInterval(() => ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: String(realtimeRef++) })), 25000);
  };
  ws.onmessage = e => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    if ((msg.event === 'INSERT' || msg.event === 'postgres_changes') && msg.payload?.data?.record) handleNewRow(msg.payload.data.record);
  };
  ws.onerror = err => console.warn('[RT]', err);
  ws.onclose = () => { clearInterval(heartbeatInterval); setTimeout(subscribeRealtime, 3000); };
}

async function pollForNew() {
  try {
    const res = await fetch(${SUPABASE_URL}/rest/v1/signatures?select=*&order=created_at.desc&limit=10, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': Bearer ${SUPABASE_ANON} }
    });
    const data = await res.json();
    if (Array.isArray(data)) [...data].reverse().forEach(row => { if (!seenIds.has(row.id)) handleNewRow(row); });
  } catch(e) {}
}

/* ── Clear ── */
document.getElementById('clear-btn').addEventListener('click', () => {
  document.getElementById('confirm-overlay').classList.add('show');
});
document.getElementById('btn-cancel').addEventListener('click', () => {
  document.getElementById('confirm-overlay').classList.remove('show');
});
document.getElementById('btn-confirm').addEventListener('click', async () => {
  document.getElementById('confirm-overlay').classList.remove('show');
  signatures.length = 0; glowCache.clear(); seenIds.clear();
  flyQueue.length = 0; flyIn = null;
  document.getElementById('sig-count').textContent = '0';
  try {
    await fetch(${SUPABASE_URL}/rest/v1/signatures?id=neq.00000000-0000-0000-0000-000000000000, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': Bearer ${SUPABASE_ANON}, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }
    });
  } catch(e) { console.warn('clear error', e); }
});

loadExisting().then(() => { subscribeRealtime(); setInterval(pollForNew, 5000); });
</script>

  <img id="mascot-img"
    src="662290127_2659513921085983_2892569749052643846_n-removebg-preview.png"
    alt="mascot" />
  <div id="mascot-bubble"></div>

<script>
(function(){
  const wrap   = document.getElementById('mascot-wrap');
  const img    = document.getElementById('mascot-img');
  const bubble = document.getElementById('mascot-bubble');

  function tween(from, to, ms, ease, onV, onDone){
    const t0 = performance.now();
    (function tick(now){
      let p = Math.min(1,(now-t0)/ms), e = ease(p);
      onV(from+(to-from)*e);
      p < 1 ? requestAnimationFrame(tick) : onDone && onDone();
    })(t0);
  }
  const easeOut = t => 1-Math.pow(1-t,3);
  const easeIn  = t => t*t*t;
  const easeIO  = t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;

  let side = 'right';
  let slideX = 0;
  let skewY  = 0;
  let bobPhase = 0, bobRAF = null;

  function buildTransform(){
    if (side === 'left') return scaleX(-1) translateX(${-slideX}px) skewY(${skewY}deg);
    return translateX(${-slideX}px) skewY(${skewY}deg);
  }
  function commit(){ img.style.transform = buildTransform(); }

  function slideTo(px, ms, ease, cb){ const from = slideX; tween(from, px, ms, ease, v=>{ slideX=v; commit(); }, cb); }
  function skewTo(deg, ms, ease, cb){ const from = skewY; tween(from, deg, ms, ease, v=>{ skewY=v; commit(); }, cb); }

  function startBob(){
    bobPhase = 0;
    function tick(){ bobPhase+=0.045; img.style.marginBottom=(Math.sin(bobPhase)*5)+'px'; bobRAF=requestAnimationFrame(tick); }
    tick();
  }
  function stopBob(cb){ cancelAnimationFrame(bobRAF); img.style.marginBottom='0px'; cb&&cb(); }

  function showBubble(txt){ bubble.textContent=txt; bubble.classList.add('show'); }
  function hideBubble(){ bubble.classList.remove('show'); }

  function setSide(s){ side=s; wrap.className='side-'+s; slideX=0; skewY=0; commit(); }

  function behaviorPeek(nextSide, done){
    setSide(nextSide);
    slideTo(90, 550, easeOut, ()=>{
      skewTo(7, 420, easeIO, ()=>{
        skewTo(-7, 600, easeIO, ()=>{
          skewTo(0, 380, easeIO, ()=>{ setTimeout(()=> slideTo(0, 620, easeIn, done), 500); });
        });
      });
    });
  }

  function behaviorWave(nextSide, done){
    setSide(nextSide);
    slideTo(75, 500, easeOut, ()=>{
      setTimeout(()=>{
        slideTo(215, 750, easeOut, ()=>{
          startBob();
          showBubble('COME JOIN US !! 👋');
          let n = 0;
          function wave(){
            if(n > 6){ skewTo(0,300,easeIO,()=>{ hideBubble(); stopBob(()=>{ setTimeout(()=> slideTo(0,750,easeIn,done),300); }); }); return; }
            skewTo(n%2===0?4:-4, 200, easeIO, ()=>{ n++; wave(); });
          }
          wave();
        });
      }, 400);
    });
  }

  function behaviorWhisper(nextSide, done){
    setSide(nextSide);
    slideTo(65, 800, easeOut, ()=>{
      let checks = 0;
      function lookAround(){
        if(checks >= 4){
          slideTo(220, 600, easeOut, ()=>{
            startBob();
            showBubble('✦ we have free lucky draw ✦');
            let w = 0;
            function nervousLook(){
              if(w > 5){ hideBubble(); stopBob(()=>{ slideTo(0, 800, easeIn, done); }); return; }
              skewTo(w%2===0?5:-3, 300, easeIO, ()=>{ w++; nervousLook(); });
            }
            setTimeout(nervousLook, 600);
          });
          return;
        }
        skewTo(checks%2===0?6:-6, 380, easeIO, ()=>{ checks++; lookAround(); });
      }
      lookAround();
    });
  }

  const sequence = [
    { fn: behaviorWave,    side: 'right' },
    { fn: behaviorWhisper, side: 'left'  },
    { fn: behaviorPeek,    side: 'right' },
    { fn: behaviorPeek,    side: 'left'  },
    { fn: behaviorWave,    side: 'left'  },
    { fn: behaviorWhisper, side: 'right' },
  ];
  let seqIdx = 0;

  function runNext(){
    const { fn, side: s } = sequence[seqIdx % sequence.length];
    seqIdx++;
    fn(s, () => { setTimeout(runNext, 4000 + Math.random()*4000); });
  }
  setTimeout(runNext, 2000);
})();
</script>
