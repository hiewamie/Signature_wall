<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAME ON SIGNATURE WALL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: #000;
    color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; 
  }

  #binary-canvas { position: fixed; inset: 0; z-index: 0; opacity: 0.15; }
  #flame-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  #sphere-canvas { position: fixed; inset: 0; z-index: 2; }

  #title { position: fixed; top: 28px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; pointer-events: none; }
  #title h1 { 
    font-family: 'Orbitron', monospace; font-size: 16px; letter-spacing: 0.5em; 
    color: #3399ff; text-shadow: 0 0 20px rgba(51,153,255,0.5); 
  }
  
  #counter { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; font-family: 'Orbitron', monospace; font-size: 10px; color: rgba(51,153,255,0.4); }
  #counter span { font-size: 18px; color: #fff; }

  #clear-btn { position: fixed; top: 0; right: 0; width: 50px; height: 50px; z-index: 100; background: transparent; border: none; }
</style>
</head>
<body>
<canvas id="binary-canvas"></canvas>
<canvas id="flame-canvas"></canvas>
<canvas id="sphere-canvas"></canvas>
<div id="title"><h1>GAME ON SIGNATURE WALL</h1></div>
<div id="counter"><span id="sig-count">0</span>&nbsp; COOL PEOPLE HAVE SIGNED</div>
<button id="clear-btn"></button>

<script>
const SUPABASE_URL  = 'https://gpdkcalhqbvztctoofwh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwZGtjYWxocWJ2enRjdG9vZndoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjIwMTksImV4cCI6MjA5MDY5ODAxOX0.M3B25IWhogS_8hKONXOjcjn4rFaJcBhIYWB77q2Z-Ew';

const canvas = document.getElementById('sphere-canvas');
const ctx = canvas.getContext('2d');
const fcanvas = document.getElementById('flame-canvas');
const fctx = fcanvas.getContext('2d');
const bcanvas = document.getElementById('binary-canvas');
const bctx = bcanvas.getContext('2d');

let W, H, cx, cy, baseR;
const fontSize = 14;
let columns, drops = [];

function resize() {
  W = canvas.width = fcanvas.width = bcanvas.width = window.innerWidth;
  H = canvas.height = fcanvas.height = bcanvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  baseR = Math.min(W, H) * 0.40;
  columns = Math.floor(W / fontSize);
  drops = Array(columns).fill(1);
}
window.addEventListener('resize', resize);
resize();

function drawBinary() {
  bctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  bctx.fillRect(0, 0, W, H);
  bctx.fillStyle = '#0044ff';
  bctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = Math.random() > 0.5 ? "1" : "0";
    bctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > H && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}

const signatures = [];
const seenIds = new Set();
let rotY = 0, rotX = 0.1, isDragging = false, lastX = 0;
let pulseT = 0, pulseState = "idle", nextPulseTime = Date.now() + 6000;

function buildGlowCanvas(img) {
  const GW = 320, GH = 120;
  const raw = document.createElement('canvas'); raw.width = GW; raw.height = GH;
  const rctx = raw.getContext('2d'); rctx.drawImage(img, 0, 0, GW, GH);
  const idata = rctx.getImageData(0, 0, GW, GH), d = idata.data;
  for (let i = 0; i < d.length; i += 4) {
    d[i] = 180; d[i+1] = 240; d[i+2] = 255;
    d[i+3] = d[i+3] > 30 ? 255 : 0;
  }
  rctx.putImageData(idata, 0, 0);
  const gc = document.createElement('canvas'); gc.width = GW; gc.height = GH;
  const gctx = gc.getContext('2d');
  gctx.filter = 'blur(5px)'; gctx.globalAlpha = 0.5; gctx.drawImage(raw, 0, 0);
  gctx.filter = 'none'; gctx.globalAlpha = 1; gctx.drawImage(raw, 0, 0);
  return gc;
}

function fibonacciPos(index, total) {
  const golden = Math.PI * (3 - Math.sqrt(5));
  const yRaw = 1 - (index / (total - 1 || 1)) * 2;
  const y = yRaw * 0.85; 
  const r = Math.sqrt(1 - y * y);
  const theta = golden * index;
  return { x: r * Math.cos(theta), y: y, z: r * Math.sin(theta) };
}

function project(pos, currentR) {
  let x = pos.x * currentR, y = pos.y * currentR, z = pos.z * currentR;
  const cY = Math.cos(rotY), sY = Math.sin(rotY), cX = Math.cos(rotX), sX = Math.sin(rotX);
  let rx = x*cY - z*sY, rz = x*sY + z*cY;
  let ry2 = y*cX - rz*sX, rz2 = y*sX + rz*cX;
  const camDist = 700, fov = 550;
  const sc = fov / (camDist + rz2); 
  return { sx: cx + rx * sc, sy: cy + ry2 * sc, scale: sc, depth: rz2, visible: (camDist + rz2) > 10 };
}

function animate() {
  const now = Date.now();
  drawBinary();

  if (now > nextPulseTime && pulseState === "idle") { pulseState = "expanding"; pulseT = 0; }
  let easeFactor = 0;
  if (pulseState === "expanding") {
    pulseT += 0.0033; easeFactor = pulseT * pulseT * (3 - 2 * pulseT);
    if (pulseT >= 1) pulseState = "shrinking";
  } else if (pulseState === "shrinking") {
    pulseT -= 0.007; easeFactor = pulseT * pulseT * (3 - 2 * pulseT);
    if (pulseT <= 0) { pulseState = "idle"; nextPulseTime = now + 7000; }
  }

  const scaleMultiplier = 1 + easeFactor * 7.0; 
  const currentR = baseR * scaleMultiplier;
  if (!isDragging) rotY += 0.0012 + (easeFactor * 0.04);

  // Flame
  fctx.clearRect(0, 0, W, H);
  fctx.save();
  fctx.globalCompositeOperation = 'screen';
  const g = fctx.createRadialGradient(cx, cy, currentR * 0.7, cx, cy, currentR * (1.1 + easeFactor * 2.5));
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(0.3, `rgba(0, 80, 200, ${0.25 * (1 - easeFactor)})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  fctx.fillStyle = g; fctx.beginPath(); fctx.arc(cx, cy, W, 0, Math.PI * 2); fctx.fill();
  fctx.restore();

  // Signatures
  ctx.clearRect(0, 0, W, H);
  const toDraw = signatures.map(s => {
    // Spawn transition logic
    if (s.spawnT < 1) s.spawnT += 0.008; // Control fly-back speed here
    
    // Smooth easing for spawn
    const t = Math.max(0, (s.spawnT - 0.3) / 0.7); // Delay fly-back for 30% of spawn duration
    const ease = t * t * (3 - 2 * t);
    
    // Interpolate between center (0,0,0) and target Fibonacci position
    const currentPos = {
      x: s.targetPos.x * ease,
      y: s.targetPos.y * ease,
      z: s.targetPos.z * ease
    };

    const proj = project(currentPos, currentR);
    return { s, ...proj, entranceScale: (1 - ease) * 2.5 + 1 }; 
  });

  toDraw.filter(p => p.visible).sort((a,b) => a.depth - b.depth).forEach(item => {
    const { s, sx, sy, scale, depth, entranceScale } = item;
    const finalScale = scale * entranceScale * (baseR * 0.38) * (1 + easeFactor * 1.5);
    const sw = finalScale, sh = finalScale * (120/320);
    
    ctx.save();
    ctx.globalAlpha = Math.min(1, ((depth + currentR) / (2 * currentR)) * 1.8) * (1 - easeFactor * 0.1);
    ctx.globalCompositeOperation = 'screen';
    if (scale > 2.5) { ctx.shadowBlur = 25; ctx.shadowColor = "#66b3ff"; }
    ctx.drawImage(s.glowCanvas, sx - sw/2, sy - sh/2, sw, sh);
    ctx.restore();
  });

  requestAnimationFrame(animate);
}

canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => { if (isDragging) { rotY += (e.clientX - lastX) * 0.008; lastX = e.clientX; } });

async function handleNewRow(row, isInitial = false) {
  if (seenIds.has(row.id)) return;
  seenIds.add(row.id);
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = () => {
    const newSig = { 
        glowCanvas: buildGlowCanvas(img), 
        spawnT: isInitial ? 1 : 0, // Initial ones are already in place
        targetPos: {x:0, y:0, z:0} 
    };
    signatures.push(newSig);
    // Update all target positions
    signatures.forEach((s, i) => {
      s.targetPos = fibonacciPos(i, signatures.length);
    });
    document.getElementById('sig-count').textContent = signatures.length;
  };
  img.src = row.image_data;
}

async function init() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/signatures?select=*`, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
    });
    const data = await res.json();
    if (data) data.forEach(row => handleNewRow(row, true));
  } catch(e) {}
  
  const ws = new WebSocket(`wss://gpdkcalhqbvztctoofwh.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_ANON}&vsn=1.0.0`);
  ws.onopen = () => ws.send(JSON.stringify({topic:'realtime:public:signatures', event:'phx_join', payload:{}, ref:'1'}));
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if ((msg.event === 'postgres_changes' || msg.event === 'INSERT') && msg.payload.data) {
        handleNewRow(msg.payload.data.record, false);
    }
  };
}

document.getElementById('clear-btn').onclick = async () => {
  if(confirm("Purge Core?")) {
    await fetch(`${SUPABASE_URL}/rest/v1/signatures?id=neq.0`, { method:'DELETE', headers:{'apikey':SUPABASE_ANON, 'Authorization':`Bearer ${SUPABASE_ANON}`} });
    location.reload();
  }
};

init();
animate();
</script>
</body>
</html>
