<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>签名签到 · Solar Signature Wall</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400&family=Orbitron:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #01040a; --cyan: #00e5ff; --blue: #1a6cff; }
  body { background: var(--bg); color: #fff; font-family: 'Noto Sans SC', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

  /* Cosmic Background */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(circle at 50% 50%, rgba(0, 30, 80, 0.4) 0%, #01040a 80%);
  }

  #sphere-canvas { position: fixed; inset: 0; z-index: 2; }
  #flame-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  #title { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; pointer-events: none; }
  #title h1 {
    font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: 0.4em; color: var(--cyan);
    text-shadow: 0 0 15px rgba(0,229,255,0.6);
  }

  #counter {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 10; font-family: 'Orbitron', sans-serif; font-size: 12px;
    letter-spacing: 0.2em; color: rgba(255,255,255,0.4); pointer-events: none;
  }
  #counter span { color: var(--cyan); font-size: 24px; font-weight: 700; text-shadow: 0 0 10px var(--cyan); }

  #clear-btn { position: fixed; top: 0; right: 0; width: 60px; height: 60px; z-index: 100; background: transparent; border: none; cursor: crosshair; }

  #confirm-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
  #confirm-overlay.show { display: flex; }
  #confirm-box { background: #0a0e1a; border: 1px solid var(--cyan); border-radius: 10px; padding: 40px; text-align: center; }
  #confirm-box button { margin: 10px; padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer; border: 1px solid var(--cyan); background: transparent; color: white; }

</style>
</head>
<body>
<canvas id="flame-canvas"></canvas>
<canvas id="sphere-canvas"></canvas>
<div id="title"><h1>SIGNATURE SOLARIS</h1></div>
<div id="counter"><span id="sig-count">0</span>&nbsp;&nbsp;COLLECTED</div>
<button id="clear-btn"></button>

<div id="confirm-overlay">
  <div id="confirm-box">
    <p>ERASE COSMOS?</p>
    <button id="btn-confirm">CLEAR</button>
    <button id="btn-cancel">CANCEL</button>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://gpdkcalhqbvztctoofwh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwZGtjYWxocWJ2enRjdG9vZndoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjIwMTksImV4cCI6MjA5MDY5ODAxOX0.M3B25IWhogS_8hKONXOjcjn4rFaJcBhIYWB77q2Z-Ew';

const canvas = document.getElementById('sphere-canvas');
const ctx = canvas.getContext('2d');
const flameCanvas = document.getElementById('flame-canvas');
const fctx = flameCanvas.getContext('2d');

let W, H, cx, cy, R;
function resize() {
  W = canvas.width = flameCanvas.width = window.innerWidth;
  H = canvas.height = flameCanvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  R = Math.min(W, H) * 0.3;
}
resize();
window.addEventListener('resize', resize);

const signatures = [];
const seenIds = new Set();
const glowCache = new Map();
let rotY = 0, rotX = 0;
let explosionT = 0; // 0 to 1 for the fly-out animation

const flyQueue = [];
let flyIn = null;
const FLY_IN_MS = 800, HOLD_MS = 2500, JOIN_MS = 1000;

function buildGlowCanvas(img) {
  const GW = 320, GH = 120;
  const c = document.createElement('canvas'); c.width = GW; c.height = GH;
  const gctx = c.getContext('2d');
  // Process image to neon cyan/white
  gctx.filter = 'brightness(2) drop-shadow(0 0 5px #00e5ff)';
  gctx.drawImage(img, 0, 0, GW, GH);
  return c;
}

function project(fx, fy, fz, isExploded) {
  // If exploded, push coordinates to edges of screen
  const factor = isExploded ? 1 + (explosionT * 3) : 1;
  let x = fx * R * factor, y = fy * R * factor, z = fz * R * factor;

  const cY = Math.cos(rotY), sY = Math.sin(rotY);
  let rx = x*cY - z*sY, rz = x*sY + z*cY, ry = y;
  
  const cX = Math.cos(rotX), sX = Math.sin(rotX);
  let ry2 = ry*cX - rz*sX, rz2 = ry*sX + rz*cX;

  const fov = 1000, sc = fov / (fov + rz2);
  return { sx: cx + rx*sc, sy: cy + ry2*sc, scale: sc, depth: rz2 };
}

function fibonacciPos(index, total) {
  const golden = Math.PI * (3 - Math.sqrt(5));
  const y = 1 - (index / (total - 1 || 1)) * 2;
  const r = Math.sqrt(1 - y * y);
  const theta = golden * index;
  return { x: r * Math.cos(theta), y: y, z: r * Math.sin(theta) };
}

function repositionAll() {
  signatures.forEach((s, i) => {
    const target = fibonacciPos(i, signatures.length);
    s.tx = target.x; s.ty = target.y; s.tz = target.z;
    if (!s.fx) { s.fx = s.tx; s.fy = s.ty; s.fz = s.tz; }
  });
}

function tickFlyIn(now) {
  if (!flyIn && flyQueue.length > 0) {
    const next = flyQueue.shift();
    flyIn = { ...next, phase: 'in', t0: now };
    explosionT = 0;
  }
  if (!flyIn) {
    explosionT = Math.max(0, explosionT - 0.05);
    return;
  }

  const elapsed = now - flyIn.t0;
  if (flyIn.phase === 'in') {
    explosionT = Math.min(1, explosionT + 0.08); // Fly out others
    if (elapsed > FLY_IN_MS) { flyIn.phase = 'hold'; flyIn.t0 = now; }
  } else if (flyIn.phase === 'hold') {
    if (elapsed > HOLD_MS) {
      commitToSphere(flyIn.glowCanvas);
      flyIn.phase = 'join'; flyIn.t0 = now;
    }
  } else if (flyIn.phase === 'join') {
    explosionT = Math.max(0, explosionT - 0.04); // Settle back
    if (elapsed > JOIN_MS) flyIn = null;
  }
}

function drawBlueRays(now) {
  fctx.save();
  fctx.translate(cx, cy);
  const time = now * 0.0005;
  
  // Outer Ring (Clockwise)
  fctx.rotate(time);
  fctx.strokeStyle = 'rgba(0, 229, 255, 0.2)';
  fctx.lineWidth = 2;
  fctx.setLineDash([20, 100]);
  fctx.beginPath(); fctx.arc(0, 0, R * 1.5, 0, Math.PI * 2); fctx.stroke();

  // Inner Ring (Counter Clockwise)
  fctx.rotate(-time * 2.5);
  fctx.strokeStyle = 'rgba(26, 108, 255, 0.3)';
  fctx.setLineDash([40, 150]);
  fctx.beginPath(); fctx.arc(0, 0, R * 1.3, 0, Math.PI * 2); fctx.stroke();
  fctx.restore();
}

function drawSun(now) {
  const t = now * 0.002;
  fctx.save();
  const grad = fctx.createRadialGradient(cx, cy, R*0.7, cx, cy, R*1.1);
  grad.addColorStop(0, 'rgba(0, 229, 255, 0.8)');
  grad.addColorStop(0.5, 'rgba(0, 100, 255, 0.4)');
  grad.addColorStop(1, 'transparent');
  
  fctx.fillStyle = grad;
  // Mimic flickering "low burning flames"
  const pulse = R + Math.sin(t) * 5;
  fctx.beginPath();
  fctx.arc(cx, cy, pulse, 0, Math.PI*2);
  fctx.fill();
  fctx.restore();
}

function animate(now) {
  ctx.clearRect(0, 0, W, H);
  fctx.clearRect(0, 0, W, H);
  
  rotY += 0.002;
  rotX = Math.sin(now * 0.0005) * 0.1;

  drawBlueRays(now);
  drawSun(now);
  tickFlyIn(now);

  // Draw Existing Signatures
  const isExploded = explosionT > 0.01;
  const sorted = signatures.map(s => ({ s, ...project(s.fx, s.fy, s.fz, isExploded) }))
                           .sort((a, b) => a.depth - b.depth);

  sorted.forEach(p => {
    const opacity = 1 - explosionT * 0.5;
    ctx.save();
    ctx.globalAlpha = opacity;
    const sw = (R * 0.5) * p.scale;
    const sh = sw * (120/320);
    ctx.drawImage(p.s.glowCanvas, p.sx - sw/2, p.sy - sh/2, sw, sh);
    ctx.restore();
  });

  // Draw Newly Entered Signature (Centered)
  if (flyIn && (flyIn.phase === 'in' || flyIn.phase === 'hold')) {
    const p = Math.min(1, (now - flyIn.t0) / 500);
    const scale = flyIn.phase === 'in' ? 0.5 + p * 0.8 : 1.3 + Math.sin(now*0.01)*0.02;
    const alpha = flyIn.phase === 'in' ? p : 1;
    
    ctx.save();
    ctx.globalAlpha = alpha;
    const bw = W * 0.4 * scale;
    const bh = bw * (120/320);
    ctx.drawImage(flyIn.glowCanvas, cx - bw/2, cy - bh/2, bw, bh);
    ctx.restore();
  }

  requestAnimationFrame(animate);
}

function commitToSphere(glowCanvas) {
  signatures.push({ glowCanvas, fx: 0, fy: 0, fz: 1 });
  repositionAll();
  document.getElementById('sig-count').textContent = signatures.length;
}

function handleNewRow(row) {
  if (seenIds.has(row.id)) return;
  seenIds.add(row.id);
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = () => {
    flyQueue.push({ glowCanvas: buildGlowCanvas(img) });
  };
  img.src = row.image_data;
}

// --- KEEPING YOUR ORIGINAL SUPABASE CONNECTORS ---

async function loadExisting() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/signatures?select=*&order=created_at.asc`, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
    });
    const data = await res.json();
    if (Array.isArray(data)) data.forEach(row => {
      seenIds.add(row.id);
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => commitToSphere(buildGlowCanvas(img));
      img.src = row.image_data;
    });
  } catch(e) {}
}

function subscribeRealtime() {
  const ws = new WebSocket(`wss://gpdkcalhqbvztctoofwh.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_ANON}&vsn=1.0.0`);
  ws.onopen = () => {
    ws.send(JSON.stringify({ topic: 'realtime:public:signatures', event: 'phx_join', payload: { config: { postgres_changes: [{ event: 'INSERT', schema: 'public', table: 'signatures' }] } }, ref: "1" }));
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.payload?.data?.record) handleNewRow(msg.payload.data.record);
  };
}

document.getElementById('clear-btn').onclick = () => document.getElementById('confirm-overlay').classList.add('show');
document.getElementById('btn-cancel').onclick = () => document.getElementById('confirm-overlay').classList.remove('show');
document.getElementById('btn-confirm').onclick = async () => {
  signatures.length = 0; seenIds.clear();
  document.getElementById('sig-count').textContent = '0';
  document.getElementById('confirm-overlay').classList.remove('show');
  await fetch(`${SUPABASE_URL}/rest/v1/signatures?id=neq.0`, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
  });
};

loadExisting().then(subscribeRealtime);
requestAnimationFrame(animate);
</script>
</body>
</html>
