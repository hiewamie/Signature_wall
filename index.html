<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature Wall</title>

<style>
  body {
    margin: 0;
    background: #04050f;
    overflow: hidden;
    color: white;
    font-family: sans-serif;
  }

  canvas {
    position: fixed;
    inset: 0;
  }

  #counter {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    opacity: 0.6;
  }

  #announce {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    text-align: center;
    opacity: 0;
    pointer-events: none;
  }

  #announce.show {
    animation: pop 3s ease forwards;
  }

  @keyframes pop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -70%) scale(0.7); }
  }

  #announce img {
    width: 300px;
  }
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="counter">
  <span id="count">0</span> signatures
</div>

<div id="announce">
  <img id="announce-img">
  <div id="announce-name"></div>
</div>

<!-- ✅ Supabase -->
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = 'https://gpdkcalhqbvztctoofwh.supabase.co';
const SUPABASE_ANON = 'YOUR_KEY_HERE';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy, R;

function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
  cx = W / 2;
  cy = H / 2;
  R = Math.min(W, H) * 0.3;
}
resize();
addEventListener('resize', resize);

let rotY = 0, rotX = 0.3;

const signatures = [];

function fibonacciPos(i, total) {
  const phi = Math.PI * (3 - Math.sqrt(5));
  const y = 1 - (i / total) * 2;
  const r = Math.sqrt(1 - y * y);
  const theta = phi * i;
  return {
    x: r * Math.cos(theta),
    y,
    z: r * Math.sin(theta)
  };
}

function project(x, y, z) {
  const cY = Math.cos(rotY), sY = Math.sin(rotY);
  let rx = x * cY - z * sY;
  let rz = x * sY + z * cY;

  const cX = Math.cos(rotX), sX = Math.sin(rotX);
  let ry = y * cX - rz * sX;
  let rz2 = y * sX + rz * cX;

  const scale = 800 / (800 + rz2);

  return {
    x: cx + rx * scale,
    y: cy + ry * scale,
    scale,
    depth: rz2
  };
}

function addSignature(dataURL, name) {
  const img = new Image();
  img.src = dataURL;

  const i = signatures.length;
  const p = fibonacciPos(i, 500);

  signatures.push({
    img,
    name,
    fx: p.x,
    fy: p.y,
    fz: p.z,
    ax: 0,
    ay: 0,
    az: 0,
    animating: true,
    opacity: 0
  });

  document.getElementById('count').textContent = signatures.length;
}

function animate() {
  ctx.clearRect(0, 0, W, H);

  rotY += 0.003;

  const sorted = signatures.slice().sort((a, b) => a.fz - b.fz);

  for (let s of sorted) {
    if (!s.img.complete) continue;

    if (s.opacity < 1) s.opacity += 0.03;

    let x = s.fx, y = s.fy, z = s.fz;

    if (s.animating) {
      s.ax += (s.fx - s.ax) * 0.08;
      s.ay += (s.fy - s.ay) * 0.08;
      s.az += (s.fz - s.az) * 0.08;

      x = s.ax;
      y = s.ay;
      z = s.az;

      if (Math.abs(s.ax - s.fx) < 0.001) {
        s.animating = false;
      }
    }

    const p = project(x * R, y * R, z * R);

    ctx.globalAlpha = s.opacity;
    ctx.drawImage(s.img, p.x - 50 * p.scale, p.y - 20 * p.scale, 100 * p.scale, 40 * p.scale);
  }

  requestAnimationFrame(animate);
}
animate();

function showAnnouncement(dataURL, name) {
  const box = document.getElementById('announce');
  document.getElementById('announce-img').src = dataURL;
  document.getElementById('announce-name').textContent = name || '';

  box.classList.remove('show');
  void box.offsetWidth;
  box.classList.add('show');
}

async function loadInitial() {
  const { data } = await supabase
    .from('signatures')
    .select('*')
    .order('created_at', { ascending: true });

  data.forEach(d => addSignature(d.image_data, d.name));
}

function subscribeRealtime() {
  supabase
    .channel('sig')
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'signatures' },
      (payload) => {
        const row = payload.new;

        showAnnouncement(row.image_data, row.name);

        setTimeout(() => {
          addSignature(row.image_data, row.name);
        }, 2000);
      }
    )
    .subscribe();
}

loadInitial();
subscribeRealtime();

</script>
</body>
</html>
