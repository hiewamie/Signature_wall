<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyper-Space Signature Core</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: radial-gradient(circle at center, #001133 0%, #00040d 50%, #000000 100%);
    color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; 
  }

  #sphere-canvas { position: fixed; inset: 0; z-index: 2; }
  #flame-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  #title { position: fixed; top: 28px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; pointer-events: none; }
  #title h1 { 
    font-family: 'Orbitron', monospace; font-size: 16px; letter-spacing: 0.5em; 
    color: #3399ff; text-shadow: 0 0 20px rgba(51,153,255,0.5); 
  }
  
  #counter { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; font-family: 'Orbitron', monospace; font-size: 10px; color: rgba(51,153,255,0.4); }
  #counter span { font-size: 18px; color: #fff; }

  #clear-btn { position: fixed; top: 0; right: 0; width: 50px; height: 50px; z-index: 100; background: transparent; border: none; }
</style>
</head>
<body>
<canvas id="flame-canvas"></canvas>
<canvas id="sphere-canvas"></canvas>
<div id="title"><h1>QUANTUM CORE ACTIVE</h1></div>
<div id="counter"><span id="sig-count">0</span>&nbsp;NODES</div>
<button id="clear-btn"></button>

<script>
const SUPABASE_URL  = 'https://gpdkcalhqbvztctoofwh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwZGtjYWxocWJ2enRjdG9vZndoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjIwMTksImV4cCI6MjA5MDY5ODAxOX0.M3B25IWhogS_8hKONXOjcjn4rFaJcBhIYWB77q2Z-Ew';

const canvas = document.getElementById('sphere-canvas');
const ctx = canvas.getContext('2d');
const fcanvas = document.getElementById('flame-canvas');
const fctx = fcanvas.getContext('2d');

let W, H, cx, cy, baseR;
function resize() {
  W = canvas.width = fcanvas.width = window.innerWidth;
  H = canvas.height = fcanvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  baseR = Math.min(W, H) * 0.25; 
}
window.addEventListener('resize', resize);
resize();

let pulseT = 0;
let pulseState = "idle"; 
let nextPulseTime = Date.now() + 8000; 

const signatures = [];
const seenIds = new Set();
let rotY = 0, rotX = 0.1, isDragging = false, lastX = 0;

function buildGlowCanvas(img) {
  const GW = 320, GH = 120;
  const raw = document.createElement('canvas'); raw.width = GW; raw.height = GH;
  const rctx = raw.getContext('2d'); rctx.drawImage(img, 0, 0, GW, GH);
  const idata = rctx.getImageData(0, 0, GW, GH), d = idata.data;
  for (let i = 0; i < d.length; i += 4) {
    d[i] = 150; d[i+1] = 220; d[i+2] = 255;
    d[i+3] = d[i+3] > 30 ? 255 : 0;
  }
  rctx.putImageData(idata, 0, 0);
  const gc = document.createElement('canvas'); gc.width = GW; gc.height = GH;
  const gctx = gc.getContext('2d');
  gctx.filter = 'blur(4px)'; gctx.globalAlpha = 0.4; gctx.drawImage(raw, 0, 0);
  gctx.filter = 'none'; gctx.globalAlpha = 1; gctx.drawImage(raw, 0, 0);
  return gc;
}

function fibonacciPos(index, total) {
  const golden = Math.PI * (3 - Math.sqrt(5));
  const yRaw = 1 - (index / (total - 1 || 1)) * 2;
  const y = yRaw * 0.75; 
  const r = Math.sqrt(1 - y * y);
  const theta = golden * index;
  return { x: r * Math.cos(theta), y: y, z: r * Math.sin(theta) };
}

/** * DEEP 3D PROJECTION
 * Using a Camera Distance of 500. 
 * If (rz2 + cameraDist) <= 0, the object is BEHIND the camera.
 */
function project(fx, fy, fz, currentR) {
  let x = fx * currentR, y = fy * currentR, z = fz * currentR;
  const cY = Math.cos(rotY), sY = Math.sin(rotY), cX = Math.cos(rotX), sX = Math.sin(rotX);
  
  let rx = x*cY - z*sY, rz = x*sY + z*cY;
  let ry2 = y*cX - rz*sX, rz2 = y*sX + rz*cX;
  
  const camDist = 550; // Distance of camera from center
  const fov = 450;     // Strength of zoom
  
  // Projection factor
  const sc = fov / (camDist + rz2); 
  
  return { 
    sx: cx + rx * sc, 
    sy: cy + ry2 * sc, 
    scale: sc, 
    depth: rz2, 
    visible: (camDist + rz2) > 10 // Cull if it flies behind the viewer
  };
}

function drawCyberFlame(currentR, now, easeFactor) {
  fctx.clearRect(0, 0, W, H);
  const time = now * 0.001;
  fctx.save();
  fctx.globalCompositeOperation = 'screen';
  
  // The flame "dissolves" as we fly through the center
  const flameAlpha = 0.3 * (1 - easeFactor);
  const outer = currentR * (1.1 + easeFactor * 3);
  
  const g = fctx.createRadialGradient(cx, cy, currentR * 0.7, cx, cy, outer);
  g.addColorStop(0, 'rgba(0, 0, 0, 0)');
  g.addColorStop(0.4, `rgba(0, 40, 120, ${flameAlpha})`);
  g.addColorStop(1, 'rgba(0, 0, 0, 0)');
  
  fctx.fillStyle = g;
  fctx.beginPath(); fctx.arc(cx, cy, Math.max(0, outer), 0, Math.PI * 2); fctx.fill();
  fctx.restore();
}

function animate() {
  const now = Date.now();

  if (now > nextPulseTime && pulseState === "idle") {
    pulseState = "expanding";
    pulseT = 0;
  }

  let easeFactor = 0;
  if (pulseState === "expanding") {
    pulseT += 0.0033; // 5 Sec
    easeFactor = pulseT * pulseT * (3 - 2 * pulseT);
    if (pulseT >= 1) pulseState = "shrinking";
  } else if (pulseState === "shrinking") {
    pulseT -= 0.006; 
    easeFactor = pulseT * pulseT * (3 - 2 * pulseT);
    if (pulseT <= 0) {
      pulseState = "idle";
      nextPulseTime = now + 8000; 
    }
  }

  // Sphere grows so large that front items pass the camera (camDist = 550)
  const scaleMultiplier = 1 + easeFactor * 7.5; 
  const currentR = baseR * scaleMultiplier;
  
  const rotationSpeed = 0.0015 + (easeFactor * 0.035);
  if (!isDragging) rotY += rotationSpeed;

  drawCyberFlame(currentR, now, easeFactor);

  ctx.clearRect(0, 0, W, H);

  const projected = signatures.map(s => ({ s, ...project(s.fx, s.fy, s.fz, currentR) }));
  const sorted = projected.filter(p => p.visible).sort((a,b) => a.depth - b.depth);
  
  sorted.forEach(item => {
    const { s, sx, sy, scale, depth } = item;
    
    // Size magnification: 
    // This multiplier makes the front ones feel massive like the photo
    const sizeMagnifier = 0.6;
    const sw = (baseR * sizeMagnifier) * scale;
    const sh = sw * (120/320);
    
    // Depth styling: Front is bright white/blue, back is dim dark blue
    const depthRatio = (depth + currentR) / (2 * currentR); // 0 (far) to 1 (near)
    const visibility = (1 - easeFactor * 0.2); 
    
    ctx.save();
    ctx.globalAlpha = Math.min(1, depthRatio * 1.5) * visibility;
    ctx.globalCompositeOperation = 'screen';
    
    // If it's very close, add an extra glow boost
    if (scale > 2) ctx.shadowBlur = 15; ctx.shadowColor = "#3399ff";
    
    ctx.drawImage(s.glowCanvas, sx - sw/2, sy - sh/2, sw, sh);
    ctx.restore();
  });

  requestAnimationFrame(animate);
}

// User Controls
canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => { if (isDragging) { rotY += (e.clientX - lastX) * 0.008; lastX = e.clientX; } });

async function handleNewRow(row) {
  if (seenIds.has(row.id)) return;
  seenIds.add(row.id);
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = () => {
    signatures.push({ glowCanvas: buildGlowCanvas(img), fx:0, fy:0, fz:1 });
    signatures.forEach((s, i) => {
      const p = fibonacciPos(i, signatures.length);
      s.fx = p.x; s.fy = p.y; s.fz = p.z;
    });
    document.getElementById('sig-count').textContent = signatures.length;
  };
  img.src = row.image_data;
}

async function init() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/signatures?select=*`, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
    });
    const data = await res.json();
    if (data) data.forEach(row => handleNewRow(row));
  } catch(e) {}
  
  const ws = new WebSocket(`wss://gpdkcalhqbvztctoofwh.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_ANON}&vsn=1.0.0`);
  ws.onopen = () => ws.send(JSON.stringify({topic:'realtime:public:signatures', event:'phx_join', payload:{}, ref:'1'}));
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.event === 'postgres_changes' || msg.event === 'INSERT') handleNewRow(msg.payload.data.record);
  };
}

document.getElementById('clear-btn').onclick = async () => {
  if(confirm("Purge Core?")) {
    await fetch(`${SUPABASE_URL}/rest/v1/signatures?id=neq.0`, { method:'DELETE', headers:{'apikey':SUPABASE_ANON, 'Authorization':`Bearer ${SUPABASE_ANON}`} });
    location.reload();
  }
};

init();
animate();
</script>
</body>
</html>
