let nebulaClouds = [];
function initNebula() {

/* Arc segments per ring — pre-generated once */
const RING_ARCS = RINGS.map((_, i) => {

    start: (k / count) * Math.PI * 2 + Math.random() * 0.4,

function drawEnergyOrb(t) {
  /* breathing oscillators */
  const breath     = 0.5 + 0.5 * Math.sin(t * 0.6);
  const fastBreath = 0.5 + 0.5 * Math.sin(t * 1.4);
  const glow       = 0.82 + 0.18 * Math.sin(t * 0.38);

  /* ── dark core fill ── */
  const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.98);
  core.addColorStop(0,    'rgba(0,2,20,0.98)');
  core.addColorStop(0.50, 'rgba(0,8,45,0.94)');
  core.addColorStop(0.78, 'rgba(0,18,80,0.85)');
  core.addColorStop(0.93, 'rgba(0,35,130,0.50)');
  core.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.98, 0, Math.PI * 2);
  ctx.fillStyle = core; ctx.fill();
  ctx.restore();

  /* ── nebula clouds ── */
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.93, 0, Math.PI * 2); ctx.clip();
  for (const c of nebulaClouds) {
    c.x += c.vx; c.y += c.vy;
    const d = Math.hypot(c.x, c.y);
    if (d > R * 0.78) { c.x *= 0.96; c.y *= 0.96; c.vx *= -0.5; c.vy *= -0.5; }
    const pulse = 0.65 + 0.35 * Math.sin(t * c.speed * 1000 + c.phase);
    const ng = ctx.createRadialGradient(cx + c.x, cy + c.y, 0, cx + c.x, cy + c.y, c.size * pulse);
    const a = c.alpha * glow * pulse;
    ng.addColorStop(0,   `hsla(${c.hue},100%,65%,${a})`);
    ng.addColorStop(0.5, `hsla(${c.hue},90%,50%,${a * 0.5})`);
    ng.addColorStop(1,   `hsla(${c.hue},80%,40%,0)`);
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = ng;
    ctx.beginPath(); ctx.arc(cx + c.x, cy + c.y, c.size * pulse, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
  ctx.restore();

  /* ── concentric rings ── */
  for (let i = 0; i < RINGS.length; i++) {
    const ring = RINGS[i];
    const arcs = RING_ARCS[i];
    const angle = t * ring.rs * ring.dir;
    const pulse = i < 3
      ? 1 + 0.06 * Math.sin(t * 1.4 + i * 0.8)
      : 1 + 0.03 * Math.sin(t * 0.6 + i * 0.5);
    const rr  = R * ring.rm * pulse;
    const hue = 195 + ring.cs;
    const al  = ring.ba * glow;

    /* dim full-circle track */
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${hue},100%,60%,${al * 0.15})`;
    ctx.lineWidth = ring.sw * 0.5;
    ctx.stroke();
    ctx.restore();

    /* bright arc segments */
    for (const arc of arcs) {
      const s = arc.start + angle;
      const e = s + arc.span;

      /* core bright line */
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy, rr, s, e);
      ctx.strokeStyle = `hsla(${hue},100%,65%,${al * 0.95})`;
      ctx.lineWidth = ring.sw;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.restore();

      /* inner glow */
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy, rr, s, e);
      ctx.strokeStyle = `hsla(${hue},100%,80%,${al * 0.40})`;
      ctx.lineWidth = ring.sw * 5;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.restore();

      /* wide diffuse halo */
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy, rr, s, e);
      ctx.strokeStyle = `hsla(${hue + 15},80%,70%,${al * 0.12})`;
      ctx.lineWidth = ring.sw * 12;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.restore();
    }
  }

  /* ── crisp outer rim ── */
  const rimR = R * (0.975 + 0.025 * breath);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, rimR, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(80,220,255,${0.70 * glow})`;
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.strokeStyle = `rgba(0,200,255,${0.25 * glow})`;
  ctx.lineWidth = 10;
  ctx.stroke();
  ctx.restore();

  /* ── outer aura ── */
  const auraR = R * (1.6 + 0.07 * breath);
  const aura  = ctx.createRadialGradient(cx, cy, R * 0.93, cx, cy, auraR);
  aura.addColorStop(0,    `rgba(0,160,255,${0.22 * glow})`);
  aura.addColorStop(0.35, `rgba(0,210,255,${0.14 * glow})`);
  aura.addColorStop(0.65, `rgba(0,150,255,${0.07 * glow})`);
  aura.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = aura; ctx.fillRect(0, 0, W, H);

  /* ── orbiting moons ── */
  for (const m of moons) {
    const a   = t * m.speed + m.phase;
    const mx  = cx + Math.cos(a) * R * m.orbitR;
    const my  = cy + Math.sin(a) * R * m.orbitR * 0.28;
    const mp  = 0.82 + 0.18 * Math.sin(t * 1.1 + m.phase);
    const mg  = ctx.createRadialGradient(mx, my, 0, mx, my, m.size * 3.5 * mp);
    mg.addColorStop(0,   `rgba(180,235,255,${m.alpha * mp * 0.95})`);
    mg.addColorStop(0.4, `rgba(60,160,255,${m.alpha * mp * 0.40})`);
    mg.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = mg;
    ctx.beginPath(); ctx.arc(mx, my, m.size * 3.5 * mp, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(210,245,255,${m.alpha * mp})`;
    ctx.beginPath(); ctx.arc(mx, my, m.size * mp, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  /* ── bright centre core ── */
  const cz = R * (0.13 + 0.045 * fastBreath);
  const cb  = ctx.createRadialGradient(cx, cy, 0, cx, cy, cz);
  cb.addColorStop(0,   `rgba(255,255,255,${0.65 * glow})`);
  cb.addColorStop(0.3, `rgba(180,240,255,${0.45 * glow})`);
  cb.addColorStop(0.7, `rgba(0,180,255,${0.22 * glow})`);
  cb.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = cb; ctx.fillRect(0, 0, W, H);
}

/* ═══════════════════════════════
   SIGNATURE SPHERE

const glowCache = new Map();
function buildGlowCanvas(img) {
  const GW = 320, GH = 120;
  const raw = document.createElement('canvas'); raw.width = GW; raw.height = GH;
  const rctx = raw.getContext('2d'); rctx.drawImage(img, 0, 0, GW, GH);
  const idata = rctx.getImageData(0, 0, GW, GH), d = idata.data;
  let cs = 0;
  [[0,0],[GW-1,0],[0,GH-1],[GW-1,GH-1]].forEach(([x,y]) => {
    const i = (y * GW + x) * 4; cs += (d[i] + d[i+1] + d[i+2]) / 3;
  });
  const darkOnLight = (cs / 4) > 180;
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], bl = d[i+2], a = d[i+3];
    if (a < 10) { d[i+3] = 0; continue; }
    let ink = darkOnLight ? 1 - (r+g+bl)/(3*255) : a/255;
    if (ink < 0.06) { d[i+3] = 0; continue; }
    const tt = Math.min(1, ink * 1.5);
    d[i]   = Math.round(180 + 75 * tt);
    d[i+1] = Math.round(220 + 35 * tt);
    d[i+2] = 255;
    d[i+3] = Math.round(255 * Math.min(1, ink * 1.8));
  }
  rctx.putImageData(idata, 0, 0);
  const gc = document.createElement('canvas'); gc.width = GW; gc.height = GH;
  const gctx = gc.getContext('2d');
  [[9,0.45],[4,0.65],[1.5,0.85],[0,1]].forEach(([blur, alpha]) => {
    gctx.save();
    gctx.filter = blur ? `blur(${blur}px)` : 'none';
    gctx.globalAlpha = alpha;
    gctx.drawImage(raw, 0, 0);
    gctx.restore();
  });
  return gc;
}

const signatures = [];
const seenIds    = new Set();
let rotY = 0, rotX = 0.28, isDragging = false, lastMX = 0, lastMY = 0;

const flyQueue = [];
let flyIn = null;
const FLY_IN_MS = 600, HOLD_MS = 2000, SHRINK_MS = 900;

function enqueue(gc, name) { flyQueue.push({ gc, name }); if (!flyIn) dequeue(); }
function dequeue() {
  if (!flyQueue.length) { flyIn = null; return; }
  const n = flyQueue.shift();
  flyIn = { gc: n.gc, name: n.name, phase: 'in', t0: performance.now() };
}
function tickFlyIn(now) {
  if (!flyIn) return;
  const el = now - flyIn.t0;
  if (flyIn.phase === 'in'   && el >= FLY_IN_MS) { flyIn.phase = 'hold';   flyIn.t0 = now; }
  if (flyIn.phase === 'hold' && el >= HOLD_MS)   { commitToSphere(flyIn.gc, flyIn.name); flyIn.phase = 'shrink'; flyIn.t0 = now; }
  if (flyIn.phase === 'shrink' && el >= SHRINK_MS) { const s = signatures[signatures.length-1]; if (s) s.opacity = 1; dequeue(); }
}

function drawFlyIn(now) {
  if (!flyIn) return;
  const el = now - flyIn.t0;
  const BIG_W = Math.min(W * 0.48, 520);
  const BIG_H = BIG_W * (120/320);
  let alpha = 1, scl = 1, sx = cx, sy = cy;

  if (flyIn.phase === 'in') {
    const p = Math.min(1, el / FLY_IN_MS), ease = 1 - Math.pow(1-p, 3);
    alpha = ease; scl = 0.2 + 0.8*ease; sy = cy + 40*(1-ease);
  } else if (flyIn.phase === 'hold') {
    scl = 1 + 0.02*Math.sin(el*0.005);
  } else if (flyIn.phase === 'shrink') {
    const p = Math.min(1, el / SHRINK_MS), ease = p*p*(3-2*p);
    const s = signatures[signatures.length-1];
    let tx=cx, ty=cy, tS=1;
    if (s) { const pr=project(s.fx,s.fy,s.fz); tx=pr.sx; ty=pr.sy; tS=sigBaseW()*Math.min(pr.scale,1.15)/BIG_W; }
    sx=cx+(tx-cx)*ease; sy=cy+(ty-cy)*ease; scl=1+(tS-1)*ease; alpha=1-ease*0.3;
  }

  if (flyIn.phase !== 'shrink') {
    const sp = ctx.createRadialGradient(sx,sy,0,sx,sy,BIG_W*scl*0.9);
    const sa = flyIn.phase==='hold' ? 0.18+0.04*Math.sin(now*0.004) : alpha*0.18;
    sp.addColorStop(0,`rgba(0,180,255,${sa})`); sp.addColorStop(0.5,`rgba(0,80,200,${sa*0.4})`); sp.addColorStop(1,'rgba(0,0,0,0)');
    ctx.save(); ctx.fillStyle=sp; ctx.fillRect(0,0,W,H); ctx.restore();
  }
  const dw=BIG_W*scl, dh=BIG_H*scl;
  ctx.save(); ctx.globalAlpha=alpha; ctx.globalCompositeOperation='screen';
  ctx.drawImage(flyIn.gc, sx-dw/2, sy-dh/2, dw, dh);
  ctx.restore();
}

const sigBaseW = () => R * 0.38;

function project(fx, fy, fz) {
  let x=fx*R, y=fy*R, z=fz*R;
  const cY=Math.cos(rotY), sY=Math.sin(rotY);
  let rx=x*cY-z*sY, rz=x*sY+z*cY;
  const cX=Math.cos(rotX), sX=Math.sin(rotX);
  let ry2=y*cX-rz*sX, rz2=y*sX+rz*cX;
  const sc=900/(900+rz2);
  return { sx:cx+rx*sc, sy:cy+ry2*sc, scale:sc, depth:rz2 };
}

function fibonacciPos(i, n) {
  const g=Math.PI*(3-Math.sqrt(5)), y=(1-((i+0.5)/Math.max(n,1))*2)*0.85;
  const r=Math.sqrt(Math.max(0,1-y*y)), th=g*i;
  return { x:r*Math.cos(th), y, z:r*Math.sin(th) };
}

function repositionAll() {
  const n=signatures.length;
  signatures.forEach((s,i)=>{ const p=fibonacciPos(i,n); s.fx=p.x; s.fy=p.y; s.fz=p.z; });
}

function commitToSphere(gc, name) {
  signatures.push({ glowCanvas:gc, name, fx:0, fy:0, fz:1, opacity:0 });
  repositionAll();
  document.getElementById('sig-count').textContent = signatures.length;
}

canvas.addEventListener('mouseleave', ()=>isDragging=false);
canvas.addEventListener('touchstart', e=>{ isDragging=true; lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY; });
canvas.addEventListener('touchmove',  e=>{ if(!isDragging)return; e.preventDefault(); rotY+=(e.touches[0].clientX-lastMX)*0.005; rotX+=(e.touches[0].clientY-lastMY)*0.003; lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY; },{passive:false});
canvas.addEventListener('touchend',   ()=>isDragging=false);

function drawWireframe() {
  ctx.save();
  ctx.lineWidth=0.5; ctx.strokeStyle='rgba(0,180,255,0.04)';
  for(let i=0;i<=8;i++){
    const phi=(i/8)*Math.PI; ctx.beginPath(); let first=true;
    for(let j=0;j<=64;j++){
      const th=(j/64)*Math.PI*2, p=project(Math.sin(phi)*Math.cos(th),Math.cos(phi),Math.sin(phi)*Math.sin(th));
      if(p.depth<=0){if(first){ctx.moveTo(p.sx,p.sy);first=false;}else ctx.lineTo(p.sx,p.sy);}else first=true;
    } ctx.stroke();
  }
  ctx.lineWidth=0.9; ctx.strokeStyle='rgba(0,220,255,0.09)';
  for(let i=0;i<=8;i++){
    const phi=(i/8)*Math.PI; ctx.beginPath(); let first=true;
    for(let j=0;j<=64;j++){
      const th=(j/64)*Math.PI*2, p=project(Math.sin(phi)*Math.cos(th),Math.cos(phi),Math.sin(phi)*Math.sin(th));
      if(p.depth>0){if(first){ctx.moveTo(p.sx,p.sy);first=false;}else ctx.lineTo(p.sx,p.sy);}else first=true;
    } ctx.stroke();
  }
  ctx.restore();
}

function animate(now) {
  const t = now * 0.001;
  ctx.clearRect(0, 0, W, H);

  /* 1. energy orb (drawn first, behind everything) */
  drawEnergyOrb(t);

  /* 2. wireframe sphere overlay */
  if (!isDragging) rotY += 0.003;
  drawWireframe();

  /* 3. signatures on sphere */
  tickFlyIn(now);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R*1.08, 0, Math.PI*2); ctx.clip();
  const proj = signatures
    .map(s => ({ s, ...project(s.fx, s.fy, s.fz) }))
    .sort((a, b) => a.depth - b.depth);
  for (const { s, sx, sy, scale, depth } of proj) {
    if (!s.glowCanvas) continue;
    if (flyIn && flyIn.phase==='shrink' && s===signatures[signatures.length-1]) continue;
    if (s.opacity < 1) s.opacity = Math.min(1, s.opacity + 0.025);
    const dn = (depth + R) / (2*R);
    const df = 0.08 + 0.92 * Math.pow(dn, 1.3);
    const sw = sigBaseW() * Math.min(scale, 1.15), sh = sw*(120/320);
    ctx.save(); ctx.globalAlpha=df*s.opacity; ctx.globalCompositeOperation='screen';
    ctx.drawImage(s.glowCanvas, sx-sw/2, sy-sh/2, sw, sh);
    ctx.restore();
  }
  ctx.restore();

  /* 4. fly-in animation on top */
  drawFlyIn(now);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

/* ── ripple effect ── */
function spawnRipple() {
  const el=document.createElement('div'); el.className='ripple';
  el.style.left=cx+'px'; el.style.top=cy+'px';
  document.body.appendChild(el); setTimeout(()=>el.remove(),1500);
}

/* ── Supabase: load + realtime ── */
function addSilently(row) {
  seenIds.add(row.id);
  const img=new Image();
  img.onload=()=>{
    const k=row.id;
    if(!glowCache.has(k)) glowCache.set(k,buildGlowCanvas(img));
    signatures.push({glowCanvas:glowCache.get(k),name:row.name,fx:0,fy:0,fz:1,opacity:0});
    repositionAll();
    document.getElementById('sig-count').textContent=signatures.length;
  };
  img.src=row.image_data;
}

function handleNewRow(row) {
  if(!row||seenIds.has(row.id)) return;
  seenIds.add(row.id); spawnRipple();
  const img=new Image();
  img.onload=()=>{
    const k=row.id;
    if(!glowCache.has(k)) glowCache.set(k,buildGlowCanvas(img));
    enqueue(glowCache.get(k),row.name);
  };
  img.src=row.image_data;
}

async function loadExisting() {
  try {
    const res=await fetch(`${SUPABASE_URL}/rest/v1/signatures?select=*&order=created_at.asc`,
      {headers:{'apikey':SUPABASE_ANON,'Authorization':`Bearer ${SUPABASE_ANON}`}});
    const data=await res.json();
    if(Array.isArray(data)) data.forEach(addSilently);
  } catch(e){console.error('load fail',e);}
}

let hbInterval=null, rtRef=1;
function subscribeRealtime() {
  const ws=new WebSocket(`wss://gpdkcalhqbvztctoofwh.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_ANON}&vsn=1.0.0`);
  ws.onopen=()=>{
    ws.send(JSON.stringify({topic:'realtime:public:signatures',event:'phx_join',payload:{config:{broadcast:{self:false},presence:{key:''},postgres_changes:[{event:'INSERT',schema:'public',table:'signatures'}]}},ref:String(rtRef++)}));
    hbInterval=setInterval(()=>ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:String(rtRef++)})),25000);
  };
  ws.onmessage=e=>{
    let msg; try{msg=JSON.parse(e.data);}catch{return;}
    if((msg.event==='INSERT'||msg.event==='postgres_changes')&&msg.payload?.data?.record) handleNewRow(msg.payload.data.record);
  };
  ws.onclose=()=>{clearInterval(hbInterval);setTimeout(subscribeRealtime,3000);};
}

async function pollForNew() {
  try {
    const res=await fetch(`${SUPABASE_URL}/rest/v1/signatures?select=*&order=created_at.desc&limit=10`,
      {headers:{'apikey':SUPABASE_ANON,'Authorization':`Bearer ${SUPABASE_ANON}`}});
    const data=await res.json();
    if(Array.isArray(data)) [...data].reverse().forEach(r=>{if(!seenIds.has(r.id))handleNewRow(r);});
  } catch(e){}
}

document.getElementById('clear-btn').addEventListener('click',()=>document.getElementById('confirm-overlay').classList.add('show'));
document.getElementById('btn-cancel').addEventListener('click',()=>document.getElementById('confirm-overlay').classList.remove('show'));
document.getElementById('btn-confirm').addEventListener('click',async()=>{
  document.getElementById('confirm-overlay').classList.remove('show');
  signatures.length=0; glowCache.clear(); seenIds.clear(); flyQueue.length=0; flyIn=null;
  document.getElementById('sig-count').textContent='0';
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/signatures?id=neq.00000000-0000-0000-0000-000000000000`,{
      method:'DELETE',
      headers:{'apikey':SUPABASE_ANON,'Authorization':`Bearer ${SUPABASE_ANON}`,'Content-Type':'application/json','Prefer':'return=minimal'}
    });
  } catch(e){}
});

loadExisting().then(()=>{ subscribeRealtime(); setInterval(pollForNew,5000); });
</script>
