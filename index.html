<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>签名签到 · Signature Wall</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400&family=Orbitron:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #020818; --cyan: #00e5ff; --blue: #1a6cff; }
  body { background: var(--bg); color: #fff; font-family: 'Noto Sans SC', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

  /* Deep space background */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(10,30,100,0.55) 0%, transparent 70%),
      radial-gradient(ellipse 100% 100% at 50% 50%, rgba(2,8,24,1) 0%, transparent 100%);
  }

  /* Subtle star field */
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 90%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 55%, rgba(255,255,255,0.25) 0%, transparent 100%);
    background-size: 800px 600px;
  }

  #sphere-canvas { position: fixed; inset: 0; z-index: 1; }
  #flame-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  #title { position: fixed; top: 28px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; pointer-events: none; }
  #title h1 {
    font-family: 'Orbitron', monospace; font-size: clamp(14px, 2vw, 22px);
    font-weight: 700; letter-spacing: 0.3em; color: var(--cyan);
    text-shadow: 0 0 20px rgba(0,229,255,0.7), 0 0 50px rgba(0,229,255,0.3);
  }
  #title p { font-size: 12px; color: rgba(255,255,255,0.35); letter-spacing: 0.15em; margin-top: 4px; }

  #counter {
    position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
    z-index: 10; font-family: 'Orbitron', monospace; font-size: 11px;
    letter-spacing: 0.25em; color: rgba(255,255,255,0.25); pointer-events: none;
  }
  #counter span { color: var(--cyan); font-size: 20px; font-weight: 700; }

  #status { position: fixed; top: 16px; right: 20px; z-index: 10; font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 0.15em; color: rgba(255,255,255,0.2); display: flex; align-items: center; gap: 6px; }
  #status-dot { width: 6px; height: 6px; border-radius: 50%; background: #2ecc71; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  #clear-btn { position: fixed; top: 0; right: 0; width: 56px; height: 56px; z-index: 100; cursor: default; background: transparent; border: none; outline: none; }
  #confirm-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.78); align-items: center; justify-content: center; }
  #confirm-overlay.show { display: flex; }
  #confirm-box { background: #080c1a; border: 1px solid rgba(0,229,255,0.28); border-radius: 14px; padding: 36px 44px; text-align: center; font-family: 'Orbitron', monospace; }
  #confirm-box p { color: rgba(255,255,255,0.6); font-size: 13px; letter-spacing: 0.12em; margin-bottom: 28px; }
  #confirm-box .btns { display: flex; gap: 16px; justify-content: center; }
  #confirm-box button { padding: 11px 30px; border-radius: 8px; font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 0.15em; cursor: pointer; border: none; transition: background 0.15s; }
  #btn-confirm { background: rgba(0,229,255,0.1); color: var(--cyan); border: 1px solid rgba(0,229,255,0.35); }
  #btn-confirm:hover { background: rgba(0,229,255,0.22); }
  #btn-cancel { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.35); border: 1px solid rgba(255,255,255,0.1); }
  #btn-cancel:hover { background: rgba(255,255,255,0.09); }
  #new-sig-overlay { position: fixed; inset: 0; z-index: 20; pointer-events: none; display: flex; align-items: center; justify-content: center; }
  .ripple { position: fixed; border-radius: 50%; border: 1.5px solid var(--cyan); pointer-events: none; animation: rippleAnim 1.4s ease-out forwards; z-index: 5; }
  @keyframes rippleAnim { from{width:0;height:0;opacity:0.8;transform:translate(-50%,-50%);}to{width:600px;height:600px;opacity:0;transform:translate(-50%,-50%);} }
</style>
</head>
<body>
<canvas id="flame-canvas"></canvas>
<canvas id="sphere-canvas"></canvas>
<div id="title"><h1>GAME ON SIGNATURE WALL</h1><p>BY AMIE</p></div>
<div id="counter"><span id="sig-count">0</span>&nbsp;&nbsp;SIGNATURES</div>
<div id="status"><div id="status-dot"></div>LIVE</div>
<button id="clear-btn"></button>
<div id="new-sig-overlay"></div>
<div id="confirm-overlay">
  <div id="confirm-box">
    <p>CLEAR ALL SIGNATURES?</p>
    <div class="btns">
      <button id="btn-confirm">CLEAR</button>
      <button id="btn-cancel">CANCEL</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('sphere-canvas');
const ctx    = canvas.getContext('2d');
const flameCanvas = document.getElementById('flame-canvas');
const fctx   = flameCanvas.getContext('2d');

let W, H, cx, cy, R;
function resize() {
  W = canvas.width  = flameCanvas.width  = innerWidth;
  H = canvas.height = flameCanvas.height = innerHeight;
  cx = W / 2; cy = H / 2;
  R  = Math.min(W, H) * 0.33;
}
resize();
window.addEventListener('resize', resize);

const signatures = [];
let rotY = 0, rotX = 0.28, isDragging = false, lastMX = 0, lastMY = 0;

function project(fx, fy, fz) {
  let x = fx * R, y = fy * R, z = fz * R;
  const cY = Math.cos(rotY), sY = Math.sin(rotY);
  let rx = x*cY - z*sY, rz = x*sY + z*cY, ry = y;
  const cX = Math.cos(rotX), sX = Math.sin(rotX);
  let ry2 = ry*cX - rz*sX, rz2 = ry*sX + rz*cX;
  const fov = 900, sc = fov / (fov + rz2);
  return { sx: cx + rx*sc, sy: cy + ry2*sc, scale: sc, depth: rz2 };
}

function fibonacciPos(index, total) {
  const golden = Math.PI * (3 - Math.sqrt(5));
  const yRaw   = 1 - ((index + 0.5) / (Math.max(total, 1))) * 2;
  const y      = yRaw * 0.85;
  const r      = Math.sqrt(Math.max(0, 1 - y*y));
  const theta  = golden * index;
  return { x: r*Math.cos(theta), y, z: r*Math.sin(theta) };
}

function repositionAll() {
  const total = signatures.length;
  signatures.forEach((s, i) => {
    const p = fibonacciPos(i, total); s.fx = p.x; s.fy = p.y; s.fz = p.z;
  });
}

function commitToSphere(glowCanvas, name) {
  signatures.push({ glowCanvas, name, fx: 0, fy: 0, fz: 1, opacity: 0 });
  repositionAll();
  document.getElementById('sig-count').textContent = signatures.length;
}

/* ── Drag ── */
canvas.addEventListener('mousedown',  e => { isDragging = true; lastMX = e.clientX; lastMY = e.clientY; });
canvas.addEventListener('mousemove',  e => { if (!isDragging) return; rotY += (e.clientX - lastMX)*0.005; rotX += (e.clientY - lastMY)*0.003; lastMX = e.clientX; lastMY = e.clientY; });
canvas.addEventListener('mouseup',    () => isDragging = false);
canvas.addEventListener('mouseleave', () => isDragging = false);
canvas.addEventListener('touchstart', e => { isDragging = true; lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY; });
canvas.addEventListener('touchmove',  e => { if (!isDragging) return; e.preventDefault(); rotY += (e.touches[0].clientX - lastMX)*0.005; rotX += (e.touches[0].clientY - lastMY)*0.003; lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY; }, { passive: false });
canvas.addEventListener('touchend',   () => isDragging = false);

/* ── Sphere wireframe ── */
function drawWireframe() {
  ctx.save();
  ctx.lineWidth = 0.6;
  ctx.strokeStyle = 'rgba(0,180,255,0.03)'; // more transparent back lines
  for (let i = 0; i <= 8; i++) {
    const phi = (i / 8) * Math.PI;
    ctx.beginPath(); let first = true;
    for (let j = 0; j <= 64; j++) {
      const theta = (j / 64) * Math.PI * 2;
      const p = project(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
      if (p.depth <= 0) { if (first) { ctx.moveTo(p.sx, p.sy); first = false; } else ctx.lineTo(p.sx, p.sy); } else first = true;
    }
    ctx.stroke();
  }
  ctx.lineWidth = 0.9;
  ctx.strokeStyle = 'rgba(0,220,255,0.08)'; // more transparent front lines
  for (let i = 0; i <= 8; i++) {
    const phi = (i / 8) * Math.PI;
    ctx.beginPath(); let first = true;
    for (let j = 0; j <= 64; j++) {
      const theta = (j / 64) * Math.PI * 2;
      const p = project(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
      if (p.depth > 0) { if (first) { ctx.moveTo(p.sx, p.sy); first = false; } else ctx.lineTo(p.sx, p.sy); } else first = true;
    }
    ctx.stroke();
  }
  ctx.restore();
}

/* ── Main animation ── */
function animate(now) {
  ctx.clearRect(0,0,W,H);
  drawWireframe();
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
