<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>签名 · Sign</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400&family=Orbitron:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #04050f; --cyan: #00e5ff; }
  html, body { height: 100%; width: 100%; overflow: hidden; touch-action: none; background: var(--bg); }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .card { width: 100%; max-width: 600px; position: relative; z-index: 1; }
  h1 { font-family: 'Orbitron', sans-serif; font-size: 18px; letter-spacing: 0.2em; color: var(--cyan); text-align: center; margin-bottom: 4px; }
  p.sub { font-size: 10px; color: rgba(255,255,255,0.3); text-align: center; letter-spacing: 0.1em; margin-bottom: 20px; }
  #pad-wrapper {
    position: relative; border: 1px solid rgba(0,229,255,0.25);
    background: #060a18;
    margin-bottom: 16px; border-radius: 12px; overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,229,255,0.04);
  }
  #pad-hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 13px; color: rgba(0,229,255,0.18); font-family: 'Orbitron', sans-serif;
    pointer-events: none; transition: opacity 0.4s; text-align: center; line-height: 2.2; white-space: nowrap;
  }
  #signature-pad { display: block; width: 100%; height: 350px; cursor: crosshair; touch-action: none; }
  #name-input {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,229,255,0.2);
    color: #fff; padding: 14px; outline: none; margin-bottom: 16px; border-radius: 8px;
    font-family: 'Noto Sans SC', sans-serif; font-size: 14px;
  }
  .btn-row { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 15px; font-family: 'Orbitron', sans-serif; font-size: 11px;
    cursor: pointer; border-radius: 8px; transition: 0.2s; border: 1px solid;
  }
  .btn-clear { background: transparent; border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }
  .btn-submit { background: var(--cyan); border-color: var(--cyan); color: #000; font-weight: 700; }
  .btn-submit:active { transform: scale(0.97); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  #success { display: none; text-align: center; color: var(--cyan); padding: 50px 0; }
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #ff4757; color: white; padding: 10px 20px; border-radius: 5px;
    opacity: 0; transition: 0.3s; font-size: 12px; pointer-events: none;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="card">
  <div id="form-view">
    <h1>DIGITAL BRUSH</h1>
    <p class="sub">CALLIGRAPHY ENGINE v4.0 · 3D SHARP TIP</p>
    <div id="pad-wrapper">
      <div id="pad-hint">在此签名 · SIGN HERE</div>
      <canvas id="signature-pad"></canvas>
    </div>
    <input id="name-input" type="text" placeholder="Your Name (Optional)" maxlength="24">
    <div class="btn-row">
      <button class="btn btn-clear" onclick="clearPad()">CLEAR</button>
      <button class="btn btn-submit" id="submit-btn" onclick="submitSig()">SUBMIT SIGNATURE</button>
    </div>
  </div>
  <div id="success">
    <h2 style="font-family:'Orbitron';color:var(--cyan)">SUBMITTED</h2>
    <p style="color:white;opacity:0.6;margin-top:10px">Your brush strokes have been saved.</p>
    <button class="btn btn-clear" style="margin-top:25px" onclick="resetForm()">NEW SIGNATURE</button>
  </div>
</div>
<div id="toast"></div>

<script>
const canvas = document.getElementById('signature-pad');
const ctx    = canvas.getContext('2d');
const DPR    = window.devicePixelRatio || 1;

let isDrawing = false;
let hasMark   = false;
let rawPts    = [];
let smoothPts = [];
let widths    = [];

const MAX_W  = 28;
const MIN_W  = 0.5;
const SMOOTH = 0.40;
let curW = MAX_W * 0.4;

function setupCanvas() {
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.scale(DPR, DPR);
}
window.addEventListener('resize', setupCanvas);
setupCanvas();

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const s = e.touches ? e.touches[0] : e;
  return { x: s.clientX - r.left, y: s.clientY - r.top, t: performance.now() };
}

function smoothArr(pts) {
  if (pts.length < 3) return pts.slice();
  const out = [pts[0]];
  for (let i = 1; i < pts.length - 1; i++) {
    out.push({
      x: pts[i-1].x * 0.25 + pts[i].x * 0.5 + pts[i+1].x * 0.25,
      y: pts[i-1].y * 0.25 + pts[i].y * 0.5 + pts[i+1].y * 0.25,
      t: pts[i].t
    });
  }
  out.push(pts[pts.length - 1]);
  return out;
}

/* ─────────────────────────────────────────────────────────────────────────
   3D INK RIBBON SEGMENT
   Draws a filled quad with:
   - Sharp pointed tips using a tip overshoot polygon
   - Top-lit gradient (white highlight → cyan mid → deep blue shadow)
   - Specular ridge along the top edge
   - Thin edge glow stroke
───────────────────────────────────────────────────────────────────────── */
function drawSegment(x1, y1, w1, x2, y2, w2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.hypot(dx, dy);
  if (len < 0.4) return;

  const nx = -dy / len, ny = dx / len; // perpendicular normal
  const ux =  dx / len, uy = dy / len; // unit along direction

  const h1 = w1 / 2, h2 = w2 / 2;

  // Four ribbon corners
  const TL = { x: x1 + nx*h1, y: y1 + ny*h1 };
  const BL = { x: x1 - nx*h1, y: y1 - ny*h1 };
  const TR = { x: x2 + nx*h2, y: y2 + ny*h2 };
  const BR = { x: x2 - nx*h2, y: y2 - ny*h2 };

  // Sharp tip points — extend beyond the endpoints to a point
  const TIP  = 0.6;
  const sTip = { x: x1 - ux*h1*TIP, y: y1 - uy*h1*TIP };
  const eTip = { x: x2 + ux*h2*TIP, y: y2 + uy*h2*TIP };

  // Midpoint axis for gradient (perpendicular, top to bottom)
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  const mh = Math.max(h1,h2);

  /* ── Body gradient: top-lit 3D ink ── */
const bg = ctx.createLinearGradient(mx+nx*mh, my+ny*mh, mx-nx*mh, my-ny*mh);

// top highlight (slight reflection)
bg.addColorStop(0,    'rgba(80,80,80,0.9)');

// main ink body
bg.addColorStop(0.3,  'rgba(30,30,30,0.95)');
bg.addColorStop(0.6,  'rgba(10,10,10,0.98)');

// deep core
bg.addColorStop(1,    'rgba(0,0,0,1)');

  ctx.beginPath();
  ctx.moveTo(sTip.x, sTip.y);
  ctx.lineTo(TL.x, TL.y);
  ctx.lineTo(TR.x, TR.y);
  ctx.lineTo(eTip.x, eTip.y);
  ctx.lineTo(BR.x, BR.y);
  ctx.lineTo(BL.x, BL.y);
  ctx.closePath();
  ctx.fillStyle = bg;
  ctx.fill();

  /* ── Specular shine — top edge highlight ── */
  const sg = ctx.createLinearGradient(mx+nx*mh, my+ny*mh, mx+nx*(mh*0.5), my+ny*(mh*0.5));
  sg.addColorStop(0,   'rgba(255,255,255,0.90)');
  sg.addColorStop(0.5, 'rgba(255,255,255,0.30)');
  sg.addColorStop(1,   'rgba(255,255,255,0.0)');

  ctx.beginPath();
  ctx.moveTo(sTip.x, sTip.y);
  ctx.lineTo(TL.x, TL.y);
  ctx.lineTo(TR.x, TR.y);
  ctx.lineTo(eTip.x, eTip.y);
  const ctr1x = x2 + nx*(h2*0.12), ctr1y = y2 + ny*(h2*0.12);
  const ctr0x = x1 + nx*(h1*0.12), ctr0y = y1 + ny*(h1*0.12);
  ctx.lineTo(ctr1x, ctr1y);
  ctx.lineTo(ctr0x, ctr0y);
  ctx.closePath();
  ctx.fillStyle = sg;
  ctx.fill();

  /* ── Bottom shadow edge ── */
  const shg = ctx.createLinearGradient(mx-nx*mh, my-ny*mh, mx-nx*(mh*0.45), my-ny*(mh*0.45));
  shg.addColorStop(0,   'rgba(0,30,100,0.65)');
  shg.addColorStop(0.6, 'rgba(0,80,180,0.20)');
  shg.addColorStop(1,   'rgba(0,80,180,0.0)');

  ctx.beginPath();
  ctx.moveTo(sTip.x, sTip.y);
  ctx.lineTo(BL.x, BL.y);
  ctx.lineTo(BR.x, BR.y);
  ctx.lineTo(eTip.x, eTip.y);
  const sc1x = x2 - nx*(h2*0.15), sc1y = y2 - ny*(h2*0.15);
  const sc0x = x1 - nx*(h1*0.15), sc0y = y1 - ny*(h1*0.15);
  ctx.lineTo(sc1x, sc1y);
  ctx.lineTo(sc0x, sc0y);
  ctx.closePath();
  ctx.fillStyle = shg;
  ctx.fill();

  /* ── Thin cyan edge glow outline ── */
  ctx.beginPath();
  ctx.moveTo(sTip.x, sTip.y);
  ctx.lineTo(TL.x, TL.y);
  ctx.lineTo(TR.x, TR.y);
  ctx.lineTo(eTip.x, eTip.y);
  ctx.lineTo(BR.x, BR.y);
  ctx.lineTo(BL.x, BL.y);
  ctx.closePath();
  ctx.strokeStyle = 'rgba(0,229,255,0.22)';
  ctx.lineWidth   = 0.8;
  ctx.stroke();
}

function speedToWidth(p1, p2) {
  const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
  const dt   = Math.max(1, p2.t - p1.t);
  const spd  = dist / dt;
  const target = Math.max(MIN_W, MAX_W - spd * 0.36);
  curW = curW * SMOOTH + target * (1 - SMOOTH);
  return curW;
}

function drawLive() {
  const n = smoothPts.length;
  if (n < 2) return;
  const i = n - 1;
  let w1 = widths[i-1] || curW;
  let w2 = widths[i]   || curW;
  // Start taper
  if (i <= 6) { const tf = (i/6)**2; w1 *= tf; w2 *= tf; }
  drawSegment(
    smoothPts[i-1].x, smoothPts[i-1].y, Math.max(0.4, w1),
    smoothPts[i].x,   smoothPts[i].y,   Math.max(0.4, w2)
  );
}

function onStart(e) {
  isDrawing = true; hasMark = true;
  const p = getPos(e);
  rawPts = [p]; smoothPts = [p]; widths = [curW * 0.05];
  document.getElementById('pad-hint').style.opacity = '0';
}

function onMove(e) {
  if (!isDrawing) return;
  const p = getPos(e);
  const prev = rawPts[rawPts.length - 1];
  rawPts.push(p);
  smoothPts = smoothArr(rawPts);
  const w = speedToWidth(prev, p);
  widths.push(w);
  drawLive();
}

function onEnd() {
  if (!isDrawing) return;
  isDrawing = false;
  // End taper: paint shrinking segments in the stroke direction
  if (smoothPts.length >= 2) {
    const last = smoothPts[smoothPts.length - 1];
    const prev = smoothPts[smoothPts.length - 2];
    const ux = last.x - prev.x, uy = last.y - prev.y;
    const ul = Math.hypot(ux, uy) || 1;
    for (let i = 1; i <= 8; i++) {
      const t  = i / 8;
      const ex = last.x + (ux/ul) * curW * 0.35 * t;
      const ey = last.y + (uy/ul) * curW * 0.35 * t;
      const wA = curW * (1 - t) * (1 - t);
      const wB = curW * (1 - t) * (1 - t) * 0.3;
      if (wA < 0.3) break;
      drawSegment(last.x + (ux/ul)*curW*0.35*(t-1/8), last.y + (uy/ul)*curW*0.35*(t-1/8), wA, ex, ey, wB);
    }
  }
  rawPts = []; smoothPts = []; widths = [];
}

canvas.addEventListener('mousedown',  onStart);
window.addEventListener('mousemove',  onMove);
window.addEventListener('mouseup',    onEnd);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onStart(e); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e);  }, { passive: false });
canvas.addEventListener('touchend',   onEnd);

function clearPad() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('pad-hint').style.opacity = '1';
  hasMark = false; rawPts = []; smoothPts = []; widths = [];
  curW = MAX_W * 0.4;
}

const SUPABASE_URL  = 'https://gpdkcalhqbvztctoofwh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwZGtjYWxocWJ2enRjdG9vZndoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjIwMTksImV4cCI6MjA5MDY5ODAxOX0.M3B25IWhogS_8hKONXOjcjn4rFaJcBhIYWB77q2Z-Ew';

async function submitSig() {
  if (!hasMark) { showToast('Please draw your signature first'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'SAVING...';
  const name = document.getElementById('name-input').value.trim();
  const imageData = canvas.toDataURL('image/png');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/signatures`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name || 'Anonymous', image_data: imageData })
    });
    if (res.ok) {
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    } else throw new Error();
  } catch {
    showToast('Submit failed. Check connection.');
    btn.disabled = false; btn.textContent = 'SUBMIT SIGNATURE';
  }
}

function resetForm() {
  document.getElementById('success').style.display = 'none';
  document.getElementById('form-view').style.display = 'block';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = 'SUBMIT SIGNATURE';
  clearPad();
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
