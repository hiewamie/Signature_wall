<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Signature</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400&family=Orbitron:wght@400;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #02040a;
  --cyan: #00e5ff;
}

body {
  background: var(--bg);
  color: #fff;
  font-family: 'Noto Sans SC', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* ambient glow */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center,
    rgba(0,180,255,0.08),
    transparent 60%);
  animation: pulse 6s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: .4; }
  50% { opacity: 1; }
}

/* glass card */
.card {
  width: 100%;
  max-width: 420px;
  padding: 28px;
  border-radius: 18px;
  background: rgba(10,20,40,0.35);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(0,200,255,0.15);
  box-shadow: 0 0 40px rgba(0,150,255,0.1);
  text-align: center;
}

/* title */
h1 {
  font-family: 'Orbitron';
  font-size: 16px;
  letter-spacing: .3em;
  color: var(--cyan);
  margin-bottom: 6px;
}
.sub {
  font-size: 11px;
  opacity: .4;
  margin-bottom: 22px;
}

/* circular device */
#pad-wrapper {
  width: 300px;
  height: 300px;
  margin: 0 auto 20px;
  border-radius: 50%;

  background: radial-gradient(circle at 50% 40%, #0a1a2f, #02040a 70%);
  box-shadow:
    0 0 40px rgba(0,150,255,0.2),
    inset 0 0 30px rgba(0,150,255,0.15),
    inset 0 0 80px rgba(0,0,0,0.8);

  display: flex;
  align-items: center;
  justify-content: center;
}

/* inner pad */
#signature-pad {
  width: 85%;
  height: 85%;
  border-radius: 12px;
  background: linear-gradient(145deg, #0b223d, #081427);
  box-shadow: inset 0 0 20px rgba(0,180,255,0.2);
}

/* hint */
#pad-hint {
  position: absolute;
  font-size: 11px;
  letter-spacing: .2em;
  color: rgba(255,255,255,0.1);
  pointer-events: none;
}

/* input */
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 14px;
  border-radius: 6px;
  border: 1px solid rgba(0,200,255,0.2);
  background: rgba(255,255,255,0.03);
  color: white;
}

/* buttons */
.btn-row {
  display: flex;
  gap: 10px;
}
button {
  flex: 1;
  padding: 12px;
  border-radius: 6px;
  border: none;
  font-family: 'Orbitron';
  cursor: pointer;
}

.clear {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: #aaa;
}

.submit {
  background: rgba(0,229,255,0.15);
  color: var(--cyan);
  box-shadow: 0 0 20px rgba(0,229,255,0.2);
}
</style>
</head>

<body>

<div class="card">
  <h1>SIGN</h1>
  <div class="sub">DRAW YOUR SIGNATURE</div>

  <div id="pad-wrapper">
    <canvas id="signature-pad"></canvas>
    <div id="pad-hint">SIGN HERE</div>
  </div>

  <input id="name" placeholder="Your name (optional)" />

  <div class="btn-row">
    <button class="clear" onclick="clearPad()">CLEAR</button>
    <button class="submit" onclick="submitSig()">SUBMIT</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'YOUR_URL';
const SUPABASE_KEY = 'YOUR_KEY';

const canvas = document.getElementById('signature-pad');
const ctx = canvas.getContext('2d');

let drawing = false;
let lastX = 0;
let lastY = 0;
let hasDrawn = false;

/* init */
function init() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  ctx.strokeStyle = '#b8f1ff';
  ctx.shadowColor = 'rgba(0,200,255,0.9)';
  ctx.shadowBlur = 18;
}
init();

/* get position */
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return {
    x: t.clientX - rect.left,
    y: t.clientY - rect.top
  };
}

/* start */
function start(e) {
  drawing = true;
  const p = getPos(e);
  lastX = p.x;
  lastY = p.y;
  document.getElementById('pad-hint').style.opacity = 0;
}

/* draw with pressure feel */
function draw(e) {
  if (!drawing) return;

  const p = getPos(e);

  const dx = p.x - lastX;
  const dy = p.y - lastY;
  const speed = Math.sqrt(dx*dx + dy*dy);

  const min = 1.5;
  const max = 4.5;
  ctx.lineWidth = Math.max(max - speed * 0.15, min);

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();

  lastX = p.x;
  lastY = p.y;
  hasDrawn = true;
}

function end() { drawing = false; }

/* events */
canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', end);
canvas.addEventListener('mouseleave', end);

canvas.addEventListener('touchstart', e => { e.preventDefault(); start(e); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); draw(e); });
canvas.addEventListener('touchend', end);

/* clear */
function clearPad() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  document.getElementById('pad-hint').style.opacity = 1;
  hasDrawn = false;
}

/* submit */
async function submitSig() {
  if (!hasDrawn) return alert("Please sign first");

  const img = canvas.toDataURL();

  await fetch(`${SUPABASE_URL}/rest/v1/signatures`, {
    method: 'POST',
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      name: document.getElementById('name').value,
      image_data: img
    })
  });

  alert("Submitted ✨");
  clearPad();
}
</script>

</body>
</html>
