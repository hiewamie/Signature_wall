<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glowing White Calligraphy Brush</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0a0a1a; /* dark background to see the glow */
    overflow: hidden;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// resize canvas to full window
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// brush settings
ctx.lineWidth = 20;           // brush thickness
ctx.lineCap = 'round';        // smooth ends
ctx.lineJoin = 'round';       // smooth corners
ctx.strokeStyle = 'white';    // white ink
ctx.shadowColor = 'white';    // glow color
ctx.shadowBlur = 15;          // glow amount

let drawing = false;
let lastPos = {x: 0, y: 0};

// start drawing
function startDraw(x, y) {
    drawing = true;
    lastPos = {x, y};
    ctx.beginPath();
    ctx.moveTo(x, y);
}

// draw line
function drawLine(x, y) {
    if (!drawing) return;
    ctx.lineTo(x, y);
    ctx.stroke();
    lastPos = {x, y};
}

// stop drawing
function endDraw() {
    drawing = false;
    ctx.closePath();
}

// mouse events
canvas.addEventListener('mousedown', e => startDraw(e.clientX, e.clientY));
canvas.addEventListener('mousemove', e => drawLine(e.clientX, e.clientY));
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseout', endDraw);

// touch events for mobile
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    startDraw(t.clientX, t.clientY);
});
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    drawLine(t.clientX, t.clientY);
});
canvas.addEventListener('touchend', e => { e.preventDefault(); endDraw(); });
</script>
</body>
</html>
