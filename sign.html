<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COOL PEOPLE ONLY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400&family=Orbitron:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #04050f; --cyan: #00e5ff; }
  html, body { height: 100%; width: 100%; overflow: hidden; touch-action: none; background: var(--bg); }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .card { width: 100%; max-width: 600px; position: relative; z-index: 1; }
  h1 { font-family: 'Orbitron', sans-serif; font-size: 18px; letter-spacing: 0.2em; color: var(--cyan); text-align: center; margin-bottom: 4px; }
  p.sub { font-size: 10px; color: rgba(255,255,255,0.3); text-align: center; letter-spacing: 0.1em; margin-bottom: 20px; }
  #pad-wrapper {
    position: relative; border: 1px solid rgba(0,229,255,0.25);
    background: #060a18;
    margin-bottom: 16px; border-radius: 12px; overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,229,255,0.04);
  }
  #pad-hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 13px; color: rgba(0,229,255,0.18); font-family: 'Orbitron', sans-serif;
    pointer-events: none; transition: opacity 0.4s; text-align: center; line-height: 2.2; white-space: nowrap;
  }
  #signature-pad { display: block; width: 100%; height: 350px; cursor: crosshair; touch-action: none; }
  #name-input {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,229,255,0.2);
    color: #fff; padding: 14px; outline: none; margin-bottom: 16px; border-radius: 8px;
    font-family: 'Noto Sans SC', sans-serif; font-size: 14px;
  }
  .btn-row { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 15px; font-family: 'Orbitron', sans-serif; font-size: 11px;
    cursor: pointer; border-radius: 8px; transition: 0.2s; border: 1px solid;
  }
  .btn-clear { background: transparent; border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }
  .btn-submit { background: var(--cyan); border-color: var(--cyan); color: #000; font-weight: 700; }
  .btn-submit:active { transform: scale(0.97); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  #success { display: none; text-align: center; color: var(--cyan); padding: 50px 0; }
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #ff4757; color: white; padding: 10px 20px; border-radius: 5px;
    opacity: 0; transition: 0.3s; font-size: 12px; pointer-events: none;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="card">
  <div id="form-view">
    <h1>COOL PEOPLE ONLY</h1>
    <p class="sub">DROP YOUR BEST SIGNATURE</p>
    <div id="pad-wrapper">
      <div id="pad-hint">SIGN HERE</div>
      <canvas id="signature-pad"></canvas>
    
  </div>
  <div id="success">
    <h2 style="font-family:'Orbitron';color:var(--cyan)">PERFECT</h2>
    <p style="color:white;opacity:0.6;margin-top:10px">- Your mark is made - </p>
    <button class="btn btn-clear" style="margin-top:25px" onclick="resetForm()">NEW SIGNATURE</button>
  </div>
</div>
<div id="toast"></div>

<script>
const canvas = document.getElementById('signature-pad');
const ctx = canvas.getContext('2d');
const DPR = window.devicePixelRatio || 1;

function resizeCanvas() {
  canvas.width = canvas.offsetWidth * DPR;
  canvas.height = canvas.offsetHeight * DPR;
  ctx.scale(DPR, DPR);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let drawing = false;

function startDraw(x, y) {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function drawLine(x, y) {
  if (!drawing) return;
  ctx.lineTo(x, y);
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = 'white';
  ctx.shadowBlur = 4;
  ctx.stroke();
}

function endDraw() {
  drawing = false;
  ctx.closePath();
}

// mouse events
canvas.addEventListener('mousedown', e => startDraw(e.offsetX, e.offsetY));
canvas.addEventListener('mousemove', e => drawLine(e.offsetX, e.offsetY));
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseout', endDraw);

// touch events
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  startDraw(t.clientX - canvas.getBoundingClientRect().left, t.clientY - canvas.getBoundingClientRect().top);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  drawLine(t.clientX - canvas.getBoundingClientRect().left, t.clientY - canvas.getBoundingClientRect().top);
}, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); endDraw(); }, { passive: false });

function clearPad() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('pad-hint').style.opacity = '1';
}

// ======= Submit / reset / toast functions (kept as-is) =======
const SUPABASE_URL  = 'https://gpdkcalhqbvztctoofwh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwZGtjYWxocWJ2enRjdG9vZndoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjIwMTksImV4cCI6MjA5MDY5ODAxOX0.M3B25IWhogS_8hKONXOjcjn4rFaJcBhIYWB77q2Z-Ew';
let hasMark = false;

canvas.addEventListener('mousedown', () => { hasMark = true; });
canvas.addEventListener('touchstart', () => { hasMark = true; });

async function submitSig() {
  if (!hasMark) { showToast('Please draw your signature first'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'SAVING...';
  const name = document.getElementById('name-input').value.trim();
  const imageData = canvas.toDataURL('image/png');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/signatures`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name || 'Anonymous', image_data: imageData })
    });
    if (res.ok) {
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    } else throw new Error();
  } catch {
    showToast('Submit failed. Check connection.');
    btn.disabled = false; btn.textContent = 'SUBMIT';
  }
}

function resetForm() {
  document.getElementById('success').style.display = 'none';
  document.getElementById('form-view').style.display = 'block';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = 'SUBMIT';
  clearPad();
  hasMark = false;
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
