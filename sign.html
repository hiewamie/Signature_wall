<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>签名 · Sign</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400&family=Orbitron:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #04050f; --cyan: #00e5ff; --blue: #1a6cff; }
  html, body { height: 100%; width: 100%; overflow: hidden; touch-action: none; background: var(--bg); }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .card { width: 100%; max-width: 600px; position: relative; z-index: 1; }
  h1 { font-family: 'Orbitron', sans-serif; font-size: 18px; letter-spacing: 0.2em; color: var(--cyan); text-align: center; margin-bottom: 4px; }
  p.sub { font-size: 10px; color: rgba(255,255,255,0.3); text-align: center; letter-spacing: 0.1em; margin-bottom: 20px; }

  /* Pad Styling */
  #pad-wrapper {
    position: relative; border: 1px solid rgba(0,229,255,0.25);
    background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, rgba(26,108,255,0.05) 100%);
    margin-bottom: 16px; border-radius: 12px; overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,229,255,0.05);
  }
  #pad-hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 13px; color: rgba(0,229,255,0.2); font-family: 'Orbitron', sans-serif;
    pointer-events: none; transition: opacity 0.4s;
  }
  #signature-pad { display: block; width: 100%; height: 350px; cursor: crosshair; touch-action: none; }

  /* Controls */
  #name-input {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,229,255,0.2);
    color: #fff; padding: 14px; outline: none; margin-bottom: 16px; border-radius: 8px;
  }
  .btn-row { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 15px; font-family: 'Orbitron', sans-serif; font-size: 11px;
    cursor: pointer; border-radius: 8px; transition: 0.2s; border: 1px solid;
  }
  .btn-clear { background: transparent; border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }
  .btn-submit { background: var(--cyan); border-color: var(--cyan); color: #000; font-weight: 700; }
  .btn-submit:active { transform: scale(0.97); }

  #success { display: none; text-align: center; color: var(--cyan); padding: 50px 0; }
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #ff4757; color: white; padding: 10px 20px; border-radius: 5px;
    opacity: 0; transition: 0.3s; font-size: 12px;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="card">
  <div id="form-view">
    <h1>DIGITAL BRUSH</h1>
    <p class="sub">CHINESE CALLIGRAPHY ENGINE v2.0</p>
    <div id="pad-wrapper">
      <div id="pad-hint">在此签名 · SIGN HERE</div>
      <canvas id="signature-pad"></canvas>
    </div>
    <input id="name-input" type="text" placeholder="Your Name (Optional)" maxlength="24">
    <div class="btn-row">
      <button class="btn btn-clear" onclick="clearPad()">CLEAR</button>
      <button class="btn btn-submit" id="submit-btn" onclick="submitSig()">SUBMIT SIGNATURE</button>
    </div>
  </div>

  <div id="success">
    <h2 style="font-family: 'Orbitron';">SUBMITTED</h2>
    <p style="color: white; opacity: 0.6; margin-top: 10px;">Your brush strokes have been saved.</p>
    <button class="btn btn-clear" style="margin-top: 25px;" onclick="resetForm()">NEW SIGNATURE</button>
  </div>
</div>

<div id="toast"></div>

<script>
const canvas = document.getElementById('signature-pad');
const ctx = canvas.getContext('2d');
let isDrawing = false;
let hasMark = false;
let points = [];

// Brush Physics
let currentWidth = 4;
const MAX_WIDTH = 7;
const MIN_WIDTH = 0.5;

function setupCanvas() {
  const ratio = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;
  ctx.scale(ratio, ratio);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

window.addEventListener('resize', setupCanvas);
setupCanvas();

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - rect.left, y: t.clientY - rect.top, time: Date.now() };
}

function startDrawing(e) {
  isDrawing = true;
  points = [getPos(e)];
  document.getElementById('pad-hint').style.opacity = '0';
}

function draw(e) {
  if (!isDrawing) return;
  const newPoint = getPos(e);
  points.push(newPoint);

  if (points.length < 3) return;

  const lastPoint = points[points.length - 2];
  const midPoint = {
    x: (lastPoint.x + newPoint.x) / 2,
    y: (lastPoint.y + newPoint.y) / 2
  };

  // Speed-based width (Sharp tip logic)
  const dist = Math.sqrt(Math.pow(newPoint.x - lastPoint.x, 2) + Math.pow(newPoint.y - lastPoint.y, 2));
  const time = newPoint.time - lastPoint.time;
  const speed = dist / (time || 1);
  
  // Calculate target width: Faster = Thinner tip
  const targetWidth = Math.max(MIN_WIDTH, MAX_WIDTH - (speed * 2.5));
  currentWidth = currentWidth * 0.6 + targetWidth * 0.4; // Smoothing

  ctx.beginPath();
  ctx.lineWidth = currentWidth;
  ctx.strokeStyle = '#FFFFFF';
  
  // Subtle "ink bleed" glow
  ctx.shadowBlur = 1.5;
  ctx.shadowColor = 'rgba(0, 229, 255, 0.5)';

  // Quadratic curve for smoothness
  ctx.moveTo(points[points.length - 3].x, points[points.length - 3].y);
  ctx.quadraticCurveTo(lastPoint.x, lastPoint.y, midPoint.x, midPoint.y);
  ctx.stroke();

  hasMark = true;
}

function stopDrawing() { isDrawing = false; }

// Input Listeners
canvas.addEventListener('mousedown', startDrawing);
window.addEventListener('mousemove', draw);
window.addEventListener('mouseup', stopDrawing);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDrawing(e); }, {passive: false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); draw(e); }, {passive: false});
canvas.addEventListener('touchend', stopDrawing);

function clearPad() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('pad-hint').style.opacity = '1';
  hasMark = false;
}

// Fixed Submit Function
async function submitSig() {
  if (!hasMark) { showToast('Please draw your signature first'); return; }
  
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'SAVING...';

  const name = document.getElementById('name-input').value.trim();
  const imageData = canvas.toDataURL('image/png');

  // Replace this block with your actual Supabase credentials if different
  const SUPABASE_URL = 'https://gpdkcalhqbvztctoofwh.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwZGtjYWxocWJ2enRjdG9vZndoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjIwMTksImV4cCI6MjA5MDY5ODAxOX0.M3B25IWhogS_8hKONXOjcjn4rFaJcBhIYWB77q2Z-Ew';

  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/signatures`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON,
        'Authorization': `Bearer ${SUPABASE_ANON}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ name: name || 'Anonymous', image_data: imageData })
    });

    if (response.ok) {
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    } else {
      throw new Error();
    }
  } catch (err) {
    showToast('Submit failed. Check connection.');
    btn.disabled = false;
    btn.textContent = 'SUBMIT SIGNATURE';
  }
}

function resetForm() {
  document.getElementById('success').style.display = 'none';
  document.getElementById('form-view').style.display = 'block';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = 'SUBMIT SIGNATURE';
  clearPad();
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
