<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #02040a;
  color: white;
  font-family: 'Orbitron', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* glow background */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(0,180,255,0.1), transparent 60%);
  animation: pulse 6s infinite;
}
@keyframes pulse {
  0%,100% { opacity: .4 }
  50% { opacity: 1 }
}

/* card */
.card {
  width: 90%;
  max-width: 420px;
  padding: 24px;
  border-radius: 18px;
  background: rgba(10,20,40,0.4);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(0,200,255,0.2);
  text-align: center;
}

/* circular device */
#pad-wrapper {
  position: relative;
  width: min(80vw, 320px);
  aspect-ratio: 1;
  margin: 20px auto;
  border-radius: 50%;

  background: radial-gradient(circle at 50% 40%, #0a1a2f, #02040a 70%);
  box-shadow:
    0 0 40px rgba(0,150,255,0.2),
    inset 0 0 30px rgba(0,150,255,0.15),
    inset 0 0 80px rgba(0,0,0,0.8);

  display: flex;
  align-items: center;
  justify-content: center;
}

/* canvas */
#signature-pad {
  width: 85%;
  height: 85%;
  border-radius: 12px;
  background: linear-gradient(145deg, #0b223d, #081427);
  box-shadow: inset 0 0 20px rgba(0,180,255,0.2);
  touch-action: none;
}

/* hint */
#pad-hint {
  position: absolute;
  color: rgba(255,255,255,0.15);
  font-size: 12px;
  pointer-events: none;
}

/* input */
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: 1px solid rgba(0,200,255,0.3);
  background: rgba(255,255,255,0.05);
  color: white;
}

/* buttons */
.row {
  display: flex;
  gap: 10px;
}
button {
  flex: 1;
  padding: 12px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.clear {
  background: transparent;
  border: 1px solid #888;
  color: #aaa;
}

.submit {
  background: rgba(0,229,255,0.2);
  color: #00e5ff;
}
</style>
</head>

<body>

<div class="card">
  <h3>SIGN HERE</h3>

  <div id="pad-wrapper">
    <canvas id="signature-pad"></canvas>
    <div id="pad-hint">SIGN</div>
  </div>

  <input id="name" placeholder="Your name (optional)" />

  <div class="row">
    <button class="clear" onclick="clearPad()">CLEAR</button>
    <button class="submit" onclick="submitSig()">SUBMIT</button>
  </div>
</div>

<script>
const canvas = document.getElementById('signature-pad');
const ctx = canvas.getContext('2d');

let drawing = false;
let lastX = 0;
let lastY = 0;
let hasDrawn = false;

/* 🔥 PERFECT SCALING FIX */
function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const ratio = window.devicePixelRatio || 1;

  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;

  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#b8f1ff';
  ctx.shadowColor = 'rgba(0,200,255,0.9)';
  ctx.shadowBlur = 18;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* get position */
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return {
    x: t.clientX - rect.left,
    y: t.clientY - rect.top
  };
}

/* start */
function start(e) {
  drawing = true;
  const p = getPos(e);
  lastX = p.x;
  lastY = p.y;
  document.getElementById('pad-hint').style.opacity = 0;
}

/* draw */
function draw(e) {
  if (!drawing) return;

  const p = getPos(e);

  const dx = p.x - lastX;
  const dy = p.y - lastY;
  const speed = Math.sqrt(dx*dx + dy*dy);

  const min = 1.5;
  const max = 4.5;
  ctx.lineWidth = Math.max(max - speed * 0.15, min);

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();

  lastX = p.x;
  lastY = p.y;
  hasDrawn = true;
}

/* end */
function end() { drawing = false; }

/* events */
canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', end);
canvas.addEventListener('mouseleave', end);

canvas.addEventListener('touchstart', e => { e.preventDefault(); start(e); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); draw(e); });
canvas.addEventListener('touchend', end);

/* clear */
function clearPad() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('pad-hint').style.opacity = 1;
  hasDrawn = false;
}

/* submit (dummy) */
function submitSig() {
  if (!hasDrawn) {
    alert("Please sign first");
    return;
  }

  const img = canvas.toDataURL();
  console.log(img);

  alert("Signature captured ✨");
}
</script>

</body>
</html>
